<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Bean — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #2D1810;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.phone {
  width: 390px; height: 844px; background: #FDF8F2; border-radius: 54px; position: relative;
  box-shadow: 0 0 0 2px #3A200E, 0 0 0 8px #1C0F07, 0 32px 80px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
}
.notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #1C0F07; border-radius: 0 0 22px 22px; z-index: 100; }
.scroll { position: absolute; top: 54px; bottom: 0; left: 0; right: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { display: none; }
.status-bar { position: absolute; top: 0; left: 0; right: 0; height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 30px 10px; z-index: 10; }
.field-label { font-size: 13px; font-weight: 500; color: #6B3A2A; display: block; margin-bottom: 6px; }
.input { height: 50px; padding: 0 16px; width: 100%; background: #FAF3E8; border: 1.5px solid #E8D8B8; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: #1C0F07; outline: none; transition: border-color 150ms, box-shadow 150ms; }
.input:focus { border-color: #D4872A; box-shadow: 0 0 0 3px rgba(212,135,42,0.12); }
.input::placeholder { color: #C4A882; }
.btn-primary { height: 54px; border-radius: 32px; border: none; background: #1C0F07; color: #FDF8F2; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: transform 150ms, background 150ms; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.38; cursor: default; }
.display { font-family: 'Playfair Display', serif; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <span style="font-size:15px;font-weight:600;color:#1C0F07;letter-spacing:-0.2px">9:41</span>
    <span style="font-size:12px;color:#1C0F07;opacity:0.7">●●● WiFi ▪▪</span>
  </div>
  <div id="root"></div>
</div>

<script type="text/babel">
const { useState } = React;

const BeanMark = ({ size = 44 }) => (
  <svg width={size} height={size*1.22} viewBox="0 0 36 44" fill="none">
    <defs>
      <radialGradient id="bmbg" cx="38%" cy="30%" r="65%">
        <stop offset="0%" stopColor="#3A1E10"/>
        <stop offset="100%" stopColor="#0F0603"/>
      </radialGradient>
    </defs>
    <path d="M9 9 C7.5 6 10 3.5 8.5 1"   stroke="#D4872A" strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M18 7 C16.5 4 19 1.5 17.5 -1" stroke="#D4872A" strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M27 9 C25.5 6 28 3.5 26.5 1" stroke="#D4872A" strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M13 12 C6 14 2 21 2 28 C2 36 7 44 14 44 C17 44.5 19 44.5 22 44 C29 43 34 36 34 28 C34 20 29 13 22 12 C19 11 16 11 13 12 Z" fill="url(#bmbg)"/>
    <path d="M21 13 C15 23 23 31 15 40 C13 43 16 44 18 44" stroke="#FAF3E8" strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/>
  </svg>
);

const App = () => {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ firstName:'', lastName:'', email:'', password:'', confirm:'' });
  const [error, setError] = useState(null);
  const [done, setDone] = useState(false);
  const upd = (k, v) => { setForm(f => ({...f, [k]: v})); setError(null); };

  const canSubmit = mode === 'login'
    ? form.email.trim() && form.password
    : form.firstName.trim() && form.lastName.trim() && form.email.trim() && form.password.length >= 8 && form.password === form.confirm;

  const handleSubmit = () => {
    if (mode === 'register' && form.password !== form.confirm) { setError("Passwords don't match."); return; }
    if (mode === 'register' && form.password.length < 8) { setError("Password must be at least 8 characters."); return; }
    localStorage.setItem('mrbean_user', JSON.stringify({ firstName: form.firstName || 'Coffee', lastName: form.lastName || 'Lover', email: form.email }));
    setDone(true);
  };

  if (done) return (
    <div className="scroll" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'48px 32px', textAlign:'center', minHeight:'100%' }}>
      <div style={{ fontSize:52, marginBottom:20 }}>☕</div>
      <h2 className="display" style={{ fontSize:28, fontWeight:700, color:'#1C0F07', marginBottom:10 }}>
        {mode === 'login' ? 'Welcome back.' : `Welcome, ${form.firstName}!`}
      </h2>
      <p style={{ fontSize:14, color:'#8C5340', lineHeight:1.6 }}>
        {mode === 'login' ? "You're signed in. Time to pull a shot." : "Your account is ready. Let's dial in your first shot."}
      </p>
      <button className="btn-primary" style={{ marginTop:32 }} onClick={() => { setDone(false); setForm({firstName:'',lastName:'',email:'',password:'',confirm:''}); }}>
        ← Back to {mode === 'login' ? 'sign in' : 'register'}
      </button>
    </div>
  );

  return (
    <div className="scroll">
      {/* Brand hero */}
      <div style={{ padding:'40px 32px 32px', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center' }}>
        <BeanMark size={48}/>
        <h1 className="display" style={{ fontSize:36, fontWeight:900, color:'#1C0F07', letterSpacing:'-0.8px', marginTop:18, lineHeight:1.1 }}>Mr. Bean</h1>
        <p style={{ fontSize:14, color:'#8C5340', marginTop:8, lineHeight:1.5 }}>Your espresso, perfected.</p>
      </div>

      {/* Mode switcher */}
      <div style={{ display:'flex', background:'#F0E4CC', borderRadius:14, padding:4, margin:'0 24px 28px' }}>
        {[['login','Sign in'],['register','Create account']].map(([id, label]) => (
          <button key={id} onClick={() => { setMode(id); setError(null); }} style={{
            flex:1, height:36, borderRadius:10, border:'none', cursor:'pointer',
            background: mode===id ? '#FDF8F2' : 'transparent',
            color: mode===id ? '#1C0F07' : '#8C5340',
            fontSize:13, fontWeight:600, fontFamily:'DM Sans,sans-serif',
            boxShadow: mode===id ? '0 1px 4px rgba(28,15,7,0.1)' : 'none',
            transition:'all 150ms'
          }}>{label}</button>
        ))}
      </div>

      {/* Fields */}
      <div style={{ padding:'0 24px', display:'flex', flexDirection:'column', gap:14 }}>
        {mode === 'register' && (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div>
              <label className="field-label">First name <span style={{color:'#C4782A'}}>*</span></label>
              <input className="input" placeholder="Ada" value={form.firstName} onChange={e => upd('firstName', e.target.value)}/>
            </div>
            <div>
              <label className="field-label">Last name <span style={{color:'#C4782A'}}>*</span></label>
              <input className="input" placeholder="Lovelace" value={form.lastName} onChange={e => upd('lastName', e.target.value)}/>
            </div>
          </div>
        )}
        <div>
          <label className="field-label">Email <span style={{color:'#C4782A'}}>*</span></label>
          <input className="input" type="email" placeholder="you@example.com" value={form.email} onChange={e => upd('email', e.target.value)}/>
        </div>
        <div>
          <label className="field-label">Password <span style={{color:'#C4782A'}}>*</span></label>
          <input className="input" type="password" placeholder={mode === 'register' ? 'Min. 8 characters' : 'Your password'} value={form.password} onChange={e => upd('password', e.target.value)}/>
        </div>
        {mode === 'register' && (
          <div>
            <label className="field-label">Confirm password <span style={{color:'#C4782A'}}>*</span></label>
            <input className="input" type="password" placeholder="Same again" value={form.confirm} onChange={e => upd('confirm', e.target.value)}/>
          </div>
        )}

        {error && (
          <div style={{ background:'#FDECEA', border:'1px solid #f5c6c2', borderRadius:12, padding:'10px 14px' }}>
            <p style={{ fontSize:13, color:'#C0392B', fontWeight:500 }}>{error}</p>
          </div>
        )}

        <button className="btn-primary" onClick={handleSubmit} disabled={!canSubmit} style={{ marginTop:4 }}>
          {mode === 'login' ? 'Sign in' : 'Create account'}
        </button>

        {mode === 'login' && (
          <button style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:'#C4782A', fontWeight:600, fontFamily:'DM Sans,sans-serif', padding:'2px 0', textAlign:'center' }}>
            Forgot password?
          </button>
        )}
      </div>
      <div style={{ height:48 }}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

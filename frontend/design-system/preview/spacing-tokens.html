<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FDF8F2; font-family: 'DM Sans', sans-serif; padding: 20px; }
.section { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #8C5340; margin: 14px 0 8px; }
.section:first-child { margin-top: 0; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.bar { height: 28px; border-radius: 6px; background: #1C0F07; }
.token { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6B3A2A; width: 72px; flex-shrink: 0; }
.value { font-size: 11px; color: #8C5340; width: 36px; }
.radii-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
.radius-box { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.radius-demo { width: 52px; height: 52px; background: #1C0F07; }
.rlabel { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #6B3A2A; text-align: center; }
.rlabel2 { font-size: 10px; color: #8C5340; text-align: center; }
</style>
</head>
<body>

<div class="section">Spacing Scale</div>
<div class="row"><div class="token">--space-1</div><div class="bar" style="width:4px"></div><div class="value">4px</div></div>
<div class="row"><div class="token">--space-2</div><div class="bar" style="width:8px"></div><div class="value">8px</div></div>
<div class="row"><div class="token">--space-3</div><div class="bar" style="width:12px"></div><div class="value">12px</div></div>
<div class="row"><div class="token">--space-4</div><div class="bar" style="width:16px"></div><div class="value">16px</div></div>
<div class="row"><div class="token">--space-6</div><div class="bar" style="width:24px"></div><div class="value">24px</div></div>
<div class="row"><div class="token">--space-8</div><div class="bar" style="width:32px"></div><div class="value">32px</div></div>
<div class="row"><div class="token">--space-12</div><div class="bar" style="width:48px"></div><div class="value">48px</div></div>
<div class="row"><div class="token">--space-16</div><div class="bar" style="width:64px"></div><div class="value">64px</div></div>
<div class="row"><div class="token">--space-20</div><div class="bar" style="width:80px"></div><div class="value">80px</div></div>

<div class="section">Border Radius</div>
<div class="radii-row">
  <div class="radius-box"><div class="radius-demo" style="border-radius:6px"></div><div class="rlabel">--radius-sm</div><div class="rlabel2">6px · tags</div></div>
  <div class="radius-box"><div class="radius-demo" style="border-radius:12px"></div><div class="rlabel">--radius-md</div><div class="rlabel2">12px · inputs</div></div>
  <div class="radius-box"><div class="radius-demo" style="border-radius:20px"></div><div class="rlabel">--radius-lg</div><div class="rlabel2">20px · cards</div></div>
  <div class="radius-box"><div class="radius-demo" style="border-radius:32px"></div><div class="rlabel">--radius-xl</div><div class="rlabel2">32px · pills</div></div>
  <div class="radius-box"><div class="radius-demo" style="border-radius:9999px"></div><div class="rlabel">--radius-full</div><div class="rlabel2">full · FAB</div></div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #E8D8B8; font-family: 'DM Sans', sans-serif; padding: 20px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
.swatch { border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(28,15,7,0.1); display: flex; flex-direction: column; align-items: center; }
.logo-area { width: 100%; display: flex; align-items: center; justify-content: center; padding: 28px 32px; }
.caption { padding: 8px 16px 12px; font-size: 11px; font-weight: 500; text-align: center; width: 100%; }
</style>
</head>
<body>

<!--
  ARABICA BEAN ANATOMY used here:
  - Elongated oval, ~1:1.7 width-to-height ratio, tapered at both ends
  - Flat face with sinuous S-curve raphe groove (runs top-to-bottom, shifting side to side)
  - Slight convex highlight on upper-left to suggest rounded 3D form
  - Steam: 3 distinct S-curve wisps (not short arcs) rising from top
-->

<!-- ─── Light background ─────────────────────────────── -->
<div class="swatch" style="background:#FDF8F2; min-width:240px;">
  <div class="logo-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 84" fill="none" width="240" height="84">
      <defs>
        <radialGradient id="beanGrad" cx="38%" cy="35%" r="60%">
          <stop offset="0%"   stop-color="#3A1E10"/>
          <stop offset="100%" stop-color="#0F0603"/>
        </radialGradient>
      </defs>
      <!-- Steam: three S-curve wisps — clear top-to-bottom wave, spaced evenly -->
      <path d="M16 22 C14 16, 19 12, 17 6" stroke="#D4872A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M26 19 C24 13, 29 9,  27 3" stroke="#D4872A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M36 22 C34 16, 39 12, 37 6" stroke="#D4872A" stroke-width="2.2" stroke-linecap="round" fill="none"/>

      <!-- Bean body: elongated arabica shape — pointed tips, wider belly -->
      <path d="
        M 26 26
        C 16 27, 9 34, 9 44
        C 9 56, 16 70, 26 74
        C 29 75, 33 75, 36 74
        C 44 70, 49 58, 49 46
        C 49 34, 44 27, 36 26
        C 33 25, 29 25, 26 26 Z
      " fill="url(#beanGrad)"/>

      <!-- Subtle highlight: upper-left glow for roundness -->
      <ellipse cx="22" cy="38" rx="7" ry="11" fill="white" opacity="0.07" transform="rotate(-15 22 38)"/>

      <!-- Raphe groove: sinuous S-curve — starts top-right-of-center, swings left in middle, back right at bottom -->
      <path d="M 32 27 C 25 37, 35 50, 26 63 C 23 68, 27 73, 29 74"
            stroke="#FAF3E8" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>

      <!-- Wordmark -->
      <text x="62" y="38" font-family="'Playfair Display',Georgia,serif" font-size="20" font-weight="700" fill="#1C0F07" letter-spacing="-0.5">Mr.</text>
      <text x="62" y="66" font-family="'Playfair Display',Georgia,serif" font-size="28" font-weight="900" fill="#1C0F07" letter-spacing="-1">Bean</text>
    </svg>
  </div>
  <div class="caption" style="background:#FDF8F2; color:#6B3A2A;">On light — primary usage</div>
</div>

<!-- ─── Dark background ──────────────────────────────── -->
<div class="swatch" style="background:#1C0F07; min-width:240px;">
  <div class="logo-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 84" fill="none" width="240" height="84">
      <defs>
        <radialGradient id="beanGradDark" cx="38%" cy="35%" r="60%">
          <stop offset="0%"   stop-color="#EEE5D8"/>
          <stop offset="100%" stop-color="#C4A882"/>
        </radialGradient>
      </defs>
      <path d="M16 22 C14 16, 19 12, 17 6" stroke="#D4872A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M26 19 C24 13, 29 9,  27 3" stroke="#D4872A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M36 22 C34 16, 39 12, 37 6" stroke="#D4872A" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="
        M 26 26 C 16 27, 9 34, 9 44 C 9 56, 16 70, 26 74
        C 29 75, 33 75, 36 74 C 44 70, 49 58, 49 46
        C 49 34, 44 27, 36 26 C 33 25, 29 25, 26 26 Z
      " fill="url(#beanGradDark)"/>
      <ellipse cx="22" cy="38" rx="7" ry="11" fill="white" opacity="0.12" transform="rotate(-15 22 38)"/>
      <path d="M 32 27 C 25 37, 35 50, 26 63 C 23 68, 27 73, 29 74"
            stroke="#1C0F07" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>
      <text x="62" y="38" font-family="'Playfair Display',Georgia,serif" font-size="20" font-weight="700" fill="#FDF8F2" letter-spacing="-0.5">Mr.</text>
      <text x="62" y="66" font-family="'Playfair Display',Georgia,serif" font-size="28" font-weight="900" fill="#FDF8F2" letter-spacing="-1">Bean</text>
    </svg>
  </div>
  <div class="caption" style="background:#1C0F07; color:#D8C4A0;">On dark — reversed</div>
</div>

<!-- ─── Caramel background ───────────────────────────── -->
<div class="swatch" style="background:#D4872A; min-width:240px;">
  <div class="logo-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 84" fill="none" width="240" height="84">
      <defs>
        <radialGradient id="beanGradAccent" cx="38%" cy="35%" r="60%">
          <stop offset="0%"   stop-color="#3A1E10"/>
          <stop offset="100%" stop-color="#0F0603"/>
        </radialGradient>
      </defs>
      <path d="M16 22 C14 16, 19 12, 17 6" stroke="#FDF8F2" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M26 19 C24 13, 29 9,  27 3" stroke="#FDF8F2" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="M36 22 C34 16, 39 12, 37 6" stroke="#FDF8F2" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <path d="
        M 26 26 C 16 27, 9 34, 9 44 C 9 56, 16 70, 26 74
        C 29 75, 33 75, 36 74 C 44 70, 49 58, 49 46
        C 49 34, 44 27, 36 26 C 33 25, 29 25, 26 26 Z
      " fill="url(#beanGradAccent)"/>
      <ellipse cx="22" cy="38" rx="7" ry="11" fill="white" opacity="0.07" transform="rotate(-15 22 38)"/>
      <path d="M 32 27 C 25 37, 35 50, 26 63 C 23 68, 27 73, 29 74"
            stroke="#FAF3E8" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45"/>
      <text x="62" y="38" font-family="'Playfair Display',Georgia,serif" font-size="20" font-weight="700" fill="#1C0F07" letter-spacing="-0.5">Mr.</text>
      <text x="62" y="66" font-family="'Playfair Display',Georgia,serif" font-size="28" font-weight="900" fill="#1C0F07" letter-spacing="-1">Bean</text>
    </svg>
  </div>
  <div class="caption" style="background:#D4872A; color:#1C0F07;">On accent — special use</div>
</div>

<!-- ─── Icon mark, large ─────────────────────────────── -->
<div class="swatch" style="background:#FDF8F2; min-width:130px; max-width:130px;">
  <div class="logo-area" style="padding:20px 24px; flex-direction:column;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 88" fill="none" width="90" height="130">
      <defs>
        <radialGradient id="beanGradIcon" cx="38%" cy="35%" r="60%">
          <stop offset="0%"   stop-color="#3A1E10"/>
          <stop offset="100%" stop-color="#0F0603"/>
        </radialGradient>
      </defs>
      <!-- Steam: 3 clear S-curves -->
      <path d="M14 22 C11 15, 17 10, 14 3"  stroke="#D4872A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path d="M28 19 C25 12, 31 7,  28 0"  stroke="#D4872A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path d="M42 22 C39 15, 45 10, 42 3"  stroke="#D4872A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <!-- Bean body: elongated arabica — ~36px wide, ~56px tall -->
      <path d="
        M 22 28
        C 10 30, 4 40, 4 52
        C 4 66, 12 82, 24 86
        C 27 87, 31 87, 34 86
        C 44 82, 52 68, 52 54
        C 52 40, 46 30, 34 28
        C 31 27, 25 27, 22 28 Z
      " fill="url(#beanGradIcon)"/>
      <!-- Highlight -->
      <ellipse cx="18" cy="44" rx="8" ry="13" fill="white" opacity="0.08" transform="rotate(-12 18 44)"/>
      <!-- Raphe: sinuous S groove -->
      <path d="M 33 30 C 24 44, 36 58, 25 74 C 22 80, 26 84, 28 86"
            stroke="#FAF3E8" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.52"/>
    </svg>
  </div>
  <div class="caption" style="background:#FDF8F2; color:#6B3A2A;">Icon mark</div>
</div>

</body>
</html>

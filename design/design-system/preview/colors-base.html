<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FDF8F2; font-family: 'DM Sans', sans-serif; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .swatch { border-radius: 10px; overflow: hidden; }
  .color-block { height: 60px; width: 100%; }
  .label { padding: 6px 8px; }
  .name { font-size: 11px; font-weight: 600; color: #1C0F07; }
  .hex  { font-size: 10px; color: #6B3A2A; font-family: monospace; }
  .group-title { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #8C5340; margin: 14px 0 6px; }
</style>
</head>
<body>
<div class="group-title">Espresso</div>
<div class="grid">
  <div class="swatch"><div class="color-block" style="background:#0D0603"></div><div class="label"><div class="name" style="color:#8C5340">900</div><div class="hex">#0D0603</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#1C0F07"></div><div class="label"><div class="name" style="color:#8C5340">800</div><div class="hex">#1C0F07</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#2D1810"></div><div class="label"><div class="name" style="color:#8C5340">700</div><div class="hex">#2D1810</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#4A2518"></div><div class="label"><div class="name" style="color:#8C5340">600</div><div class="hex">#4A2518</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#6B3A2A"></div><div class="label"><div class="name" style="color:#8C5340">500</div><div class="hex">#6B3A2A</div></div></div>
</div>
<div class="grid" style="margin-top:8px">
  <div class="swatch"><div class="color-block" style="background:#8C5340"></div><div class="label"><div class="name" style="color:#8C5340">400</div><div class="hex">#8C5340</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#B07060"></div><div class="label"><div class="name" style="color:#6B3A2A">300</div><div class="hex">#B07060</div></div></div>
</div>
<div class="group-title">Caramel</div>
<div class="grid">
  <div class="swatch"><div class="color-block" style="background:#9B5E1A"></div><div class="label"><div class="name" style="color:#8C5340">600</div><div class="hex">#9B5E1A</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#C4782A"></div><div class="label"><div class="name" style="color:#6B3A2A">500</div><div class="hex">#C4782A</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#D4872A"></div><div class="label"><div class="name" style="color:#6B3A2A">400</div><div class="hex">#D4872A</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#E4A855"></div><div class="label"><div class="name" style="color:#6B3A2A">300</div><div class="hex">#E4A855</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#F0C882"></div><div class="label"><div class="name" style="color:#6B3A2A">200</div><div class="hex">#F0C882</div></div></div>
</div>
<div class="group-title">Cream</div>
<div class="grid">
  <div class="swatch" style="border:1px solid #E8D8B8"><div class="color-block" style="background:#FAF3E8"></div><div class="label"><div class="name">200</div><div class="hex">#FAF3E8</div></div></div>
  <div class="swatch" style="border:1px solid #E8D8B8"><div class="color-block" style="background:#FDF8F2"></div><div class="label"><div class="name">100</div><div class="hex">#FDF8F2</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#E8D8B8"></div><div class="label"><div class="name">400</div><div class="hex">#E8D8B8</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#D8C4A0"></div><div class="label"><div class="name">500</div><div class="hex">#D8C4A0</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#C4A882"></div><div class="label"><div class="name">600</div><div class="hex">#C4A882</div></div></div>
</div>
<div class="group-title">Matcha</div>
<div class="grid">
  <div class="swatch"><div class="color-block" style="background:#2D5235"></div><div class="label"><div class="name" style="color:#8C5340">700</div><div class="hex">#2D5235</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#4A7C59"></div><div class="label"><div class="name" style="color:#6B3A2A">500</div><div class="hex">#4A7C59</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#6A9B74"></div><div class="label"><div class="name" style="color:#6B3A2A">400</div><div class="hex">#6A9B74</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#C0D9C4"></div><div class="label"><div class="name">200</div><div class="hex">#C0D9C4</div></div></div>
  <div class="swatch" style="border:1px solid #E8D8B8"><div class="color-block" style="background:#E8F2EA"></div><div class="label"><div class="name">100</div><div class="hex">#E8F2EA</div></div></div>
</div>
</body>
</html>

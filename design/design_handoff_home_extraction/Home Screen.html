<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Bean — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #2D1810;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.phone {
  width: 390px; height: 844px; background: #FDF8F2;
  border-radius: 54px;
  box-shadow: 0 0 0 2px #3A200E, 0 0 0 8px #1C0F07, 0 40px 100px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(255,255,255,0.04);
  overflow: hidden; position: relative;
}
.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 126px; height: 37px; background: #1C0F07;
  border-radius: 0 0 22px 22px; z-index: 200;
}
.scroll {
  position: absolute; top: 54px; bottom: 88px; left: 0; right: 0;
  overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
}
.scroll::-webkit-scrollbar { display: none; }
.status-bar {
  height: 54px; width: 100%;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 30px 10px;
  position: absolute; top: 0; left: 0; z-index: 10;
}
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0; height: 88px;
  background: rgba(253,248,242,0.94); backdrop-filter: blur(20px);
  border-top: 1px solid #F0E4CC;
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 12px; z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer; padding: 4px 20px; border-radius: 12px;
  transition: transform 120ms;
}
.nav-btn:active { transform: scale(0.88); }
/* Modal sheet */
.modal-overlay {
  position: absolute; inset: 0; z-index: 150;
  display: flex; align-items: flex-end;
}
.modal-backdrop {
  position: absolute; inset: 0; background: rgba(28,15,7,0.5);
  animation: fIn 280ms ease;
}
@keyframes fIn { from { opacity:0; } to { opacity:1; } }
.modal-panel {
  position: relative; z-index: 1; width: 100%;
  background: #FDF8F2; border-radius: 32px 32px 0 0;
  height: 92%; overflow-y: auto;
  box-shadow: 0 -8px 48px rgba(28,15,7,0.18);
  animation: slideUp 360ms cubic-bezier(0.32,0,0.15,1.1);
}
.modal-panel::-webkit-scrollbar { display: none; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.handle { width: 38px; height: 4px; background: #D8C4A0; border-radius: 9999px; margin: 14px auto 0; }
/* Sub-sheets */
.sub-sheet {
  position: absolute; inset: 0; z-index: 160;
  display: flex; align-items: flex-end;
}
.sub-panel {
  position: relative; z-index: 1; width: 100%;
  background: #FDF8F2; border-radius: 28px 28px 0 0;
  max-height: 88%; overflow-y: auto;
  box-shadow: 0 -4px 32px rgba(28,15,7,0.16);
  animation: slideUp 300ms cubic-bezier(0.33,1,0.68,1);
  padding-bottom: 32px;
}
.sub-panel::-webkit-scrollbar { display: none; }
@keyframes steamRise {
  0%   { transform: translateY(0)    scaleX(1);    opacity: 0;   }
  20%  { opacity: 0.55; }
  80%  { opacity: 0.35; }
  100% { transform: translateY(-22px) scaleX(1.3);  opacity: 0;   }
}
@keyframes steamWave {
  0%,100% { d: path("M0 0 Q3 -5 0 -10 Q-3 -15 0 -20"); }
  50%      { d: path("M0 0 Q-3 -5 0 -10 Q3 -15 0 -20"); }
}
.steam-line { animation: steamRise 1.8s ease-in-out infinite; }
.steam-line:nth-child(2) { animation-delay: 0.6s; }
.steam-line:nth-child(3) { animation-delay: 1.2s; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div id="root" style="width:100%;height:100%;position:relative;"></div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Palette ─────────────────────────────────────── */
const C = {
  e900:'#0D0603', e800:'#1C0F07', e700:'#2D1810', e600:'#4A2518',
  e500:'#6B3A2A', e400:'#8C5340', e300:'#B07060',
  ca500:'#C4782A', ca400:'#D4872A', ca300:'#E4A855', ca200:'#F0C882', ca100:'#F8E4B8',
  cr600:'#C4A882', cr500:'#D8C4A0', cr400:'#E8D8B8', cr300:'#F0E4CC', cr200:'#FAF3E8', cr100:'#FDF8F2',
  m700:'#2D5235', m600:'#3A6644', m500:'#4A7C59', m400:'#6A9B74', m200:'#C0D9C4', m100:'#E8F2EA',
  err:'#C0392B', errL:'#FDECEA',
};

/* ── Mock data ───────────────────────────────────── */
const BEANS = [
  { id:'b1', name:'Yirgacheffe Natural', roaster:'Square Mile', roast:'light'        },
  { id:'b2', name:'Kenya Kirinyaga AA',  roaster:'Hasbean',      roast:'medium_light' },
  { id:'b3', name:'Colombia Huila',      roaster:'Round Hill',   roast:'medium'       },
  { id:'b4', name:'El Salvador Finca',   roaster:'Ozone',        roast:'medium_dark'  },
];
const ROAST_COLOR = { light:C.ca400, medium_light:C.e400, medium:C.e500, medium_dark:C.e600, dark:C.e800 };
const ROAST_LABEL = { light:'Light', medium_light:'Med. light', medium:'Medium', medium_dark:'Med. dark', dark:'Dark' };

const ALL_GEAR = [
  { id:'g1', tid:'machine',     name:'Rocket Appartamento'  },
  { id:'g2', tid:'grinder',     name:'Niche Zero'           },
  { id:'g3', tid:'scale',       name:'Acaia Pearl'          },
  { id:'g4', tid:'portafilter', name:'IMS 18g'              },
  { id:'g5', tid:'tamper',      name:'Decent Tamper'        },
  { id:'g6', tid:'distributor', name:'Pullman BigStep'      },
];
const STATIONS = [
  { id:'s1', name:'Morning station', gear:['g1','g2','g3','g5'] },
  { id:'s2', name:'Weekend setup',   gear:['g1','g2','g3','g4','g5','g6'] },
];
const GEAR_LABEL = { machine:'Machine', grinder:'Grinder', scale:'Scale', portafilter:'Portafilter', tamper:'Tamper', distributor:'Distributor' };

const RECENTS = [
  { id:'e1', bean:'Yirgacheffe Natural', roaster:'Square Mile', dose:18.0, yield:36.5, time:27.4, ratio:'1:2.0', zone:'perfect', ago:'2h ago',    note:'Juicy and bright — lovely floral finish.' },
  { id:'e2', bean:'Kenya Kirinyaga AA',  roaster:'Hasbean',      dose:17.5, yield:38.0, time:31.2, ratio:'1:2.2', zone:'over',    ago:'Yesterday', note:'Slightly over. Bitter on the back end.'   },
  { id:'e3', bean:'Colombia Huila',      roaster:'Round Hill',   dose:18.5, yield:37.0, time:26.3, ratio:'1:2.0', zone:'under',   ago:'2 days ago',note:'A touch under — sweetness is there.'     },
];

/* ── Icons ───────────────────────────────────────── */
const I = ({ d, size=22, sw=2, fill='none', stroke='currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke}
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {typeof d === 'string' ? <path d={d}/> : d}
  </svg>
);
const ChevR = () => <I size={15} sw={2.5} d="M9 18l6-6-6-6"/>;
const Plus  = ({ s=20 }) => <I size={s} d="M12 5v14M5 12h14"/>;
const X     = ({ s=20 }) => <I size={s} d="M18 6L6 18M6 6l12 12"/>;
const Check = () => <I size={15} sw={2.5} d="M20 6L9 17l-5-5"/>;
const Play  = () => <svg width={20} height={20} viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
const Stop  = () => <svg width={18} height={18} viewBox="0 0 24 24" fill="#fff" stroke="none"><rect x="5" y="5" width="14" height="14" rx="3"/></svg>;
const Redo  = () => <I size={18} sw={2} d="M1 4v6h6M3.51 15a9 9 0 102.13-9.36L1 10"/>;

const BeanMark = ({ size=28 }) => (
  <svg width={size} height={size} viewBox="0 0 36 44" fill="none">
    <defs><radialGradient id="bg2" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stopColor="#3A1E10"/><stop offset="100%" stopColor="#0F0603"/>
    </radialGradient></defs>
    <path d="M9 9C7.5 6 10 3.5 8.5 1" stroke={C.ca400} strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M18 7C16.5 4 19 1.5 17.5-1" stroke={C.ca400} strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M27 9C25.5 6 28 3.5 26.5 1" stroke={C.ca400} strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M13 12C6 14 2 21 2 28C2 36 7 44 14 44C17 44.5 19 44.5 22 44C29 43 34 28 34 28C34 20 29 13 22 12C19 11 16 11 13 12Z" fill="url(#bg2)"/>
    <path d="M21 13C15 23 23 31 15 40C13 43 16 44 18 44" stroke={C.cr100} strokeWidth="1.4" strokeLinecap="round" opacity="0.4"/>
  </svg>
);

/* ── Zone helpers ────────────────────────────────── */
function zoneOf(elapsed, target) {
  if (elapsed < target - 4) return 'under';
  if (elapsed <= target + 4) return 'perfect';
  return 'over';
}
const ZONE_COLOR = { under: C.ca400, perfect: C.m500, over: C.err };
const ZONE_LABEL = { under: 'Under', perfect: 'On target', over: 'Over' };
const ZONE_BADGE = {
  perfect: { bg: C.m100,  fg: C.m700  },
  under:   { bg: C.ca100, fg:'#7A4E0A' },
  over:    { bg: C.errL, fg: C.err    },
};

/* ── Coffee Cup Animation (small) ───────────────── */
function CoffeeCup({ progress, isDone, isRunning }) {
  const p       = Math.min(Math.max(progress, 0), 1);
  const fillH   = 26 * p;          // max fill height in viewBox units
  const fillY   = 38 - fillH;      // bottom of cup interior at y=38

  // golden → espresso as it fills
  const lr = Math.round(212 + (28  - 212) * p);
  const lg = Math.round(135 + (15  - 135) * p);
  const lb = Math.round(42  + (7   -  42) * p);
  const liquid = `rgb(${lr},${lg},${lb})`;

  return (
    <svg width={44} height={56} viewBox="0 0 44 56" style={{ overflow:'visible' }}>
      <defs>
        <clipPath id="smCup">
          <path d="M5 12 Q4 38 7 40 L33 40 Q36 38 35 12 Z"/>
        </clipPath>
      </defs>

      {/* Steam wisps when done */}
      {isDone && [13, 20, 27].map((x, i) => (
        <line key={i} x1={x} y1={11} x2={x} y2={2}
          stroke={C.cr500} strokeWidth={1.5} strokeLinecap="round"
          style={{ animation:'steamRise 1.8s ease-in-out infinite', animationDelay:`${i * 0.6}s` }}
        />
      ))}

      {/* Saucer */}
      <ellipse cx={20} cy={47} rx={17} ry={3.5} fill={C.cr300}/>
      <rect x={5} y={44} width={30} height={4} rx={2} fill={C.cr300}/>

      {/* Cup body */}
      <path d="M5 12 Q4 38 7 40 L33 40 Q36 38 35 12 Z" fill={C.cr100}/>

      {/* Liquid fill */}
      {fillH > 0 && (
        <g clipPath="url(#smCup)">
          <rect x={0} y={fillY} width={44} height={fillH + 1} fill={liquid}/>
          {/* crema */}
          {fillH > 3 && (
            <ellipse cx={20} cy={fillY} rx={12} ry={2} fill={C.ca300} opacity={0.7}/>
          )}
        </g>
      )}

      {/* Rim */}
      <rect x={4} y={10} width={32} height={4} rx={2} fill={C.cr300}/>
      {/* Outline */}
      <path d="M5 12 Q4 38 7 40 L33 40 Q36 38 35 12 Z" fill="none" stroke={C.cr400} strokeWidth={1}/>
      {/* Handle */}
      <path d="M35 18 Q43 18 43 26 Q43 34 35 34" fill="none" stroke={C.cr400} strokeWidth={3} strokeLinecap="round"/>
      <path d="M35 18 Q43 18 43 26 Q43 34 35 34" fill="none" stroke={C.cr200} strokeWidth={1.5} strokeLinecap="round"/>
    </svg>
  );
}

/* ── Timer Ring ──────────────────────────────────── */
const R = 88, CX = 110, CY = 110, CIRC = 2 * Math.PI * R;

function TimerRing({ elapsed, target, phase }) {
  // phase: 'idle' | 'preinfusion' | 'running' | 'done'
  const progress = phase === 'idle' ? 0 : Math.min(elapsed / target, 1.5);
  const dashOffset = CIRC - Math.min(progress, 1) * CIRC;
  const zone = phase === 'idle' ? 'under' : zoneOf(elapsed, target);
  const color = ZONE_COLOR[zone];

  // Zone arc helpers
  const underEnd   = Math.max(0, (target - 4) / target);
  const perfectLen = Math.min(8 / target, 1 - underEnd);

  const secs = Math.floor(elapsed);
  const mm = String(Math.floor(secs / 60)).padStart(2, '0');
  const ss = String(secs % 60).padStart(2, '0');

  return (
    <div style={{ position:'relative', width:220, height:220 }}>
      <svg width={220} height={220} style={{ transform:'rotate(-90deg)', display:'block' }}>
        {/* Track */}
        <circle cx={CX} cy={CY} r={R} fill="none" stroke={C.cr400} strokeWidth={10}/>
        {/* Under zone bg arc */}
        <circle cx={CX} cy={CY} r={R} fill="none"
          stroke={C.ca300} strokeWidth={10} opacity={0.3}
          strokeDasharray={`${underEnd * CIRC} ${CIRC}`}
        />
        {/* Perfect zone bg arc */}
        <circle cx={CX} cy={CY} r={R} fill="none"
          stroke={C.m400} strokeWidth={10} opacity={0.35}
          strokeDasharray={`${perfectLen * CIRC} ${CIRC}`}
          style={{ transformOrigin:`${CX}px ${CY}px`, transform:`rotate(${underEnd * 360}deg)` }}
        />
        {/* Live progress */}
        {phase !== 'idle' && (
          <circle cx={CX} cy={CY} r={R} fill="none"
            stroke={color} strokeWidth={10} strokeLinecap="round"
            strokeDasharray={CIRC} strokeDashoffset={dashOffset}
            style={{ transition: (phase==='running'||phase==='preinfusion') ? 'stroke 0.6s ease' : 'all 0.35s ease' }}
          />
        )}
      </svg>

      {/* Center text */}
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4 }}>
        {phase === 'idle' ? (
          <>
            <div style={{ fontFamily:'JetBrains Mono', fontSize:14, fontWeight:500, color:C.cr500, letterSpacing:1 }}>ready</div>
            <div style={{ fontFamily:'JetBrains Mono', fontSize:44, fontWeight:600, color:C.cr400, letterSpacing:-2, lineHeight:1 }}>--:--</div>
          </>
        ) : (
          <>
            {phase === 'preinfusion' && (
              <div style={{ fontSize:11, fontWeight:600, color:C.ca400, letterSpacing:'0.07em', textTransform:'uppercase' }}>Pre-infusion</div>
            )}
            <div style={{ fontFamily:'JetBrains Mono', fontSize:52, fontWeight:600, color:C.e800, letterSpacing:-2, lineHeight:1 }}>
              {mm}:{ss}
            </div>
            {phase !== 'idle' && elapsed > 0 && (
              <div style={{ fontSize:12, fontWeight:600, color:color, letterSpacing:'0.05em', textTransform:'uppercase', transition:'color 0.6s ease' }}>
                {ZONE_LABEL[zone]}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ── Editable Stat ───────────────────────────────── */
function EditableStat({ label, value, unit, placeholder, onChange, locked }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft]     = useState('');
  const ref = useRef();

  function start() {
    if (locked) return;
    setDraft(value != null ? String(value) : '');
    setEditing(true);
    setTimeout(() => ref.current?.select(), 20);
  }
  function commit() {
    const n = parseFloat(draft);
    onChange(isNaN(n) ? null : n);
    setEditing(false);
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6, flex:1 }}>
      <div style={{ fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', color:C.e400 }}>{label}</div>
      {editing ? (
        <input ref={ref} type="number" value={draft}
          onChange={e => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e => e.key==='Enter' && commit()}
          style={{
            fontFamily:'JetBrains Mono', fontSize:28, fontWeight:600, color:C.e800,
            background:'none', border:'none', borderBottom:`2px solid ${C.ca400}`,
            outline:'none', width:80, textAlign:'center', letterSpacing:-1,
          }}
        />
      ) : (
        <button onClick={start} style={{ background:'none', border:'none', cursor: locked ? 'default' : 'pointer', padding:0, display:'flex', alignItems:'baseline', gap:2 }}>
          <span style={{ fontFamily:'JetBrains Mono', fontSize:28, fontWeight:600, color: value != null ? C.e800 : C.cr500, letterSpacing:-1 }}>
            {value != null ? value : placeholder || '—'}
          </span>
          {unit && <span style={{ fontFamily:'JetBrains Mono', fontSize:14, color:C.e400, fontWeight:400 }}>{unit}</span>}
        </button>
      )}
    </div>
  );
}

/* ── Bean Sub-Sheet ──────────────────────────────── */
function BeanSubSheet({ selected, onSelect, onClose }) {
  return (
    <div className="sub-sheet">
      <div style={{ position:'absolute', inset:0, background:'rgba(28,15,7,0.3)' }} onClick={onClose}/>
      <div className="sub-panel">
        <div className="handle"/>
        <div style={{ padding:'20px 22px 16px' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:22, fontWeight:700, color:C.e800, marginBottom:2 }}>Your beans</div>
          <div style={{ fontSize:13, color:C.e400 }}>Pick what you're pulling today</div>
        </div>
        <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:8 }}>
          {BEANS.map(b => {
            const sel = selected?.id === b.id;
            return (
              <button key={b.id} onClick={() => { onSelect(b); onClose(); }} style={{
                display:'flex', alignItems:'center', gap:12,
                background: sel ? C.e800 : C.cr200,
                border:`1.5px solid ${sel ? C.e800 : C.cr400}`,
                borderRadius:16, padding:'13px 15px', cursor:'pointer', textAlign:'left',
              }}>
                <div style={{ width:36, height:36, borderRadius:10, background: sel ? C.e700 : C.cr300, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <div style={{ width:13, height:17, borderRadius:'50% 50% 50% 50% / 60% 60% 40% 40%', background: ROAST_COLOR[b.roast] }}/>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:700, color: sel ? C.cr100 : C.e800 }}>{b.name}</div>
                  <div style={{ fontSize:12, color: sel ? C.cr600 : C.e400, marginTop:2 }}>{b.roaster} · {ROAST_LABEL[b.roast]}</div>
                </div>
                {sel && <span style={{ color:C.ca400, lineHeight:0 }}><Check/></span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── Gear Sub-Sheet ──────────────────────────────── */
function GearSubSheet({ selected, onSave, onClose }) {
  const [sel, setSel] = useState(selected.map(g => g.id));
  function toggle(id) { setSel(prev => prev.includes(id) ? prev.filter(x => x!==id) : [...prev, id]); }
  function loadStation(s) { setSel(prev => [...new Set([...prev, ...s.gear])]); }

  return (
    <div className="sub-sheet">
      <div style={{ position:'absolute', inset:0, background:'rgba(28,15,7,0.3)' }} onClick={onClose}/>
      <div className="sub-panel">
        <div className="handle"/>
        <div style={{ padding:'20px 22px 16px' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:22, fontWeight:700, color:C.e800, marginBottom:2 }}>Gear used</div>
          <div style={{ fontSize:13, color:C.e400 }}>Load a station, then fine-tune</div>
        </div>
        {/* Station pills */}
        <div style={{ padding:'0 16px 20px', display:'flex', gap:8 }}>
          {STATIONS.map(s => (
            <button key={s.id} onClick={() => loadStation(s)} style={{
              flex:1, padding:'10px 12px', background:C.cr200, border:`1.5px solid ${C.cr400}`,
              borderRadius:14, cursor:'pointer', textAlign:'left',
            }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.e800 }}>{s.name}</div>
              <div style={{ fontSize:11, color:C.e400, marginTop:2 }}>{s.gear.length} items</div>
            </button>
          ))}
        </div>
        {/* Gear list */}
        <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:7 }}>
          {ALL_GEAR.map(g => {
            const on = sel.includes(g.id);
            return (
              <button key={g.id} onClick={() => toggle(g.id)} style={{
                display:'flex', alignItems:'center', gap:10,
                background: on ? C.e800 : C.cr200,
                border:`1.5px solid ${on ? C.e800 : C.cr400}`,
                borderRadius:14, padding:'11px 13px', cursor:'pointer',
              }}>
                <div style={{ flex:1, textAlign:'left' }}>
                  <div style={{ fontSize:14, fontWeight:600, color: on ? C.cr100 : C.e800 }}>{g.name}</div>
                  <div style={{ fontSize:11, color: on ? C.cr600 : C.e400, marginTop:1 }}>{GEAR_LABEL[g.tid] || 'Other'}</div>
                </div>
                <div style={{ width:22, height:22, borderRadius:11, background: on ? C.ca400 : 'transparent', border:`1.5px solid ${on ? C.ca400 : C.cr500}`, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', flexShrink:0 }}>
                  {on && <Check/>}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{ padding:'20px 16px 0' }}>
          <button onClick={() => { onSave(ALL_GEAR.filter(g => sel.includes(g.id))); onClose(); }} style={{
            width:'100%', height:52, borderRadius:9999, background:C.e800,
            border:'none', cursor:'pointer', fontSize:15, fontWeight:700, color:C.cr100,
          }}>
            Done · {sel.length} item{sel.length!==1?'s':''}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Extraction Modal ────────────────────────────── */
function ExtractionModal({ onClose, onSaved }) {
  // Timer
  const [phase, setPhase]     = useState('idle'); // idle | preinfusion | running | done
  const [elapsed, setElapsed] = useState(0);
  const [piElapsed, setPiEl]  = useState(0);

  // Fields
  const [bean, setBean]           = useState(null);
  const [dose, setDose]           = useState(18.0);
  const [yieldG, setYieldG]       = useState(null);
  const [grind, setGrind]         = useState(null);
  const [target, setTarget]       = useState(27);
  const [preInf, setPreInf]       = useState(false);
  const [piSecs, setPiSecs]       = useState(8);
  const [gear, setGear]           = useState([ALL_GEAR[0], ALL_GEAR[1], ALL_GEAR[2]]);
  const [note, setNote]           = useState('');
  const [manualMode, setManualMode] = useState(false);
  const [manualVal, setManualVal]   = useState('');

  // Sub-sheets
  const [showBean, setShowBean] = useState(false);
  const [showGear, setShowGear] = useState(false);
  const [showNote, setShowNote] = useState(false);

  const rafRef  = useRef(null);
  const t0Ref   = useRef(null);
  const piDone  = useRef(false);

  // Live timer
  useEffect(() => {
    if (phase !== 'running' && phase !== 'preinfusion') return;
    const origin = performance.now();
    t0Ref.current = origin;
    const tick = (now) => {
      const dt = (now - t0Ref.current) / 1000;
      if (phase === 'preinfusion') {
        setPiEl(dt);
        if (dt >= piSecs && !piDone.current) {
          piDone.current = true;
          t0Ref.current  = now;
          setPhase('running');
          return;
        }
      } else {
        setElapsed(dt);
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [phase, piSecs]);

  function start() {
    piDone.current = false;
    setElapsed(0); setPiEl(0);
    setPhase(preInf ? 'preinfusion' : 'running');
  }
  function stop() {
    cancelAnimationFrame(rafRef.current);
    setPhase('done');
  }
  function reset() {
    cancelAnimationFrame(rafRef.current);
    setElapsed(0); setPiEl(0);
    setPhase('idle'); setManualVal('');
  }
  function logManual() {
    const t = parseFloat(manualVal);
    if (!isNaN(t) && t > 0) { setElapsed(t); setPhase('done'); }
  }
  function save() {
    onSaved();
    onClose();
  }

  const isRunning  = phase === 'running' || phase === 'preinfusion';
  const isDone     = phase === 'done';
  const displayEl  = phase === 'preinfusion' ? piElapsed : elapsed;
  const displayTgt = phase === 'preinfusion' ? piSecs    : target;
  const zone       = isDone ? zoneOf(elapsed, target) : null;

  // Ratio display
  const ratio = dose && yieldG ? (yieldG / dose).toFixed(1) : null;

  return (
    <div className="modal-overlay">
      <div className="modal-backdrop" onClick={!isRunning ? onClose : undefined}/>
      <div className="modal-panel">
        <div className="handle"/>

        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 22px 0' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:22, fontWeight:700, color:C.e800, fontStyle:'italic' }}>
            New extraction
          </div>
          {!isRunning && (
            <button onClick={onClose} style={{ background:C.cr300, border:'none', cursor:'pointer', width:32, height:32, borderRadius:9999, display:'flex', alignItems:'center', justifyContent:'center', color:C.e500 }}>
              <X s={16}/>
            </button>
          )}
        </div>

        {/* Bean selector */}
        <div style={{ padding:'16px 20px 0' }}>
          <button onClick={() => !isRunning && setShowBean(true)} style={{
            width:'100%', display:'flex', alignItems:'center', gap:10,
            background: bean ? C.e800 : C.cr200,
            border:`1.5px solid ${bean ? C.e800 : C.cr400}`,
            borderRadius:16, padding:'12px 16px', cursor: isRunning ? 'default' : 'pointer', textAlign:'left',
          }}>
            {bean ? (
              <div style={{ width:28, height:28, borderRadius:8, background:C.e700, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <div style={{ width:11, height:14, borderRadius:'50% 50% 50% 50% / 60% 60% 40% 40%', background:ROAST_COLOR[bean.roast] }}/>
              </div>
            ) : (
              <div style={{ width:28, height:28, borderRadius:8, background:C.cr300, flexShrink:0 }}/>
            )}
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:700, color: bean ? C.cr100 : C.e500 }}>
                {bean ? bean.name : 'Select beans'}
              </div>
              {bean && <div style={{ fontSize:11, color:C.cr600, marginTop:1 }}>{bean.roaster} · {ROAST_LABEL[bean.roast]}</div>}
            </div>
            {!isRunning && <span style={{ color: bean ? C.e500 : C.cr600, lineHeight:0 }}><ChevR/></span>}
          </button>
        </div>

        {/* Ring */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'16px 0 10px' }}>
          <TimerRing elapsed={displayEl} target={displayTgt} phase={phase}/>
        </div>

        {/* Zone band after done */}
        {isDone && (
          <div style={{ display:'flex', justifyContent:'center', paddingBottom:8 }}>
            <div style={{ background:ZONE_COLOR[zone], borderRadius:9999, padding:'6px 20px' }}>
              <span style={{ fontSize:13, fontWeight:700, color:'#fff', letterSpacing:'0.04em' }}>
                {ZONE_LABEL[zone]} · {Math.floor(elapsed)}s
              </span>
            </div>
          </div>
        )}

        {/* Aim for + pre-infusion — idle only */}
        {phase === 'idle' && (
          <div style={{ padding:'0 24px 24px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:13, color:C.e500, fontWeight:500 }}>Aim for</span>
              <div style={{ display:'flex', alignItems:'center', background:C.cr300, borderRadius:9999, overflow:'hidden' }}>
                <button onClick={() => setTarget(t => Math.max(10, t-1))} style={{ width:34, height:32, background:'none', border:'none', color:C.e500, cursor:'pointer', fontSize:18, fontWeight:300 }}>−</button>
                <span style={{ fontFamily:'JetBrains Mono', fontSize:14, fontWeight:600, color:C.e800, minWidth:32, textAlign:'center' }}>{target}s</span>
                <button onClick={() => setTarget(t => Math.min(90, t+1))} style={{ width:34, height:32, background:'none', border:'none', color:C.e500, cursor:'pointer', fontSize:18, fontWeight:300 }}>+</button>
              </div>
            </div>
            <button onClick={() => setPreInf(p => !p)} style={{
              display:'flex', alignItems:'center', gap:6,
              background: preInf ? C.ca100 : 'transparent',
              border:`1.5px solid ${preInf ? C.ca400 : C.cr400}`,
              borderRadius:9999, padding:'6px 12px', cursor:'pointer',
            }}>
              <div style={{ width:8, height:8, borderRadius:9999, background: preInf ? C.ca400 : C.cr500 }}/>
              <span style={{ fontSize:12, fontWeight:600, color: preInf ? C.ca500 : C.e400 }}>Pre-infusion</span>

            </button>
          </div>
        )}

        {/* Divider */}
        <div style={{ height:1, background:C.cr300, margin:'0 22px' }}/>

        {/* Stats */}
        <div style={{ padding:'24px 24px 20px', display:'flex', alignItems:'flex-start', gap:0 }}>
          <EditableStat label="Dose in" value={dose} unit="g" onChange={setDose} locked={isRunning}/>
          <div style={{ width:1, background:C.cr400, height:48, margin:'8px 0 0' }}/>
          <EditableStat label="Yield out" value={yieldG} unit="g" placeholder="—" onChange={setYieldG} locked={isRunning}/>
          <div style={{ width:1, background:C.cr400, height:48, margin:'8px 0 0' }}/>
          <EditableStat label="Grind size" value={grind} placeholder="—" onChange={setGrind} locked={isRunning}/>
        </div>

        {/* Ratio */}
        {ratio && (
          <div style={{ padding:'0 24px 20px', textAlign:'center' }}>
            <span style={{ fontFamily:'JetBrains Mono', fontSize:13, color:C.ca500, fontWeight:600 }}>1:{ratio} ratio</span>
          </div>
        )}

        {/* Divider */}
        <div style={{ height:1, background:C.cr300, margin:'0 22px' }}/>

        {/* Gear row */}
        <button onClick={() => !isRunning && setShowGear(true)} style={{
          width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'18px 24px', background:'none', border:'none', cursor: isRunning ? 'default' : 'pointer',
          textAlign:'left',
        }}>
          <div>
            <div style={{ fontSize:12, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', color:C.e400, marginBottom:4 }}>Gear used</div>
            <div style={{ fontSize:14, fontWeight:600, color:C.e800 }}>
              {gear.length > 0 ? gear.map(g => g.name).join(' · ') : 'Add gear'}
            </div>
          </div>
          {!isRunning && <span style={{ color:C.cr600, lineHeight:0 }}><ChevR/></span>}
        </button>

        {/* Divider */}
        <div style={{ height:1, background:C.cr300, margin:'0 22px' }}/>

        {/* Note field — done state */}
        {isDone && (
          <div style={{ padding:'18px 22px' }}>
            <div style={{ fontSize:12, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', color:C.e400, marginBottom:10 }}>Tasting note</div>
            <textarea value={note} onChange={e => setNote(e.target.value)}
              placeholder="How did it taste? Sour, sweet, balanced…"
              style={{
                width:'100%', minHeight:72, padding:'12px 14px', resize:'none',
                background:C.cr200, border:`1.5px solid ${C.cr400}`, borderRadius:14,
                fontFamily:'DM Sans', fontSize:14, color:C.e800, outline:'none', lineHeight:1.5,
              }}
            />
          </div>
        )}

        {/* Manual mode */}
        {phase === 'idle' && manualMode && (
          <div style={{ padding:'0 22px 20px', display:'flex', gap:8 }}>
            <input type="number" placeholder="Time in seconds" value={manualVal} onChange={e => setManualVal(e.target.value)}
              style={{
                flex:1, height:46, padding:'0 14px', borderRadius:12,
                background:C.cr200, border:`1.5px solid ${C.cr400}`,
                fontFamily:'JetBrains Mono', fontSize:16, fontWeight:600, color:C.e800, outline:'none',
              }}
            />
            <button onClick={logManual} style={{ height:46, padding:'0 18px', borderRadius:12, background:C.e800, border:'none', cursor:'pointer', fontSize:14, fontWeight:700, color:C.cr100 }}>Log</button>
          </div>
        )}

        {/* CTA */}
        <div style={{ padding:'12px 22px 32px', display:'flex', flexDirection:'column', gap:10 }}>
          {phase === 'idle' && !manualMode && (
            <button onClick={start} style={{
              height:56, borderRadius:9999, border:'none', cursor:'pointer',
              background:C.m500, fontSize:16, fontWeight:700, color:'#fff',
              display:'flex', alignItems:'center', justifyContent:'center', gap:10,
              boxShadow:`0 6px 24px rgba(74,124,89,0.38)`,
            }}>
              <Play/> Start extraction
            </button>
          )}
          {isRunning && (
            <button onClick={stop} style={{
              height:56, borderRadius:9999, border:'none', cursor:'pointer',
              background:C.err, fontSize:16, fontWeight:700, color:'#fff',
              display:'flex', alignItems:'center', justifyContent:'center', gap:10,
              boxShadow:`0 6px 24px rgba(192,57,43,0.35)`,
            }}>
              <Stop/> Stop
            </button>
          )}
          {isDone && (
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={reset} style={{
                width:56, height:56, borderRadius:9999, background:C.cr300,
                border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:C.e500, flexShrink:0,
              }}>
                <Redo/>
              </button>
              <button onClick={save} style={{
                flex:1, height:56, borderRadius:9999, background:C.ca400, border:'none', cursor:'pointer',
                fontSize:16, fontWeight:700, color:'#fff',
                boxShadow:`0 6px 20px rgba(212,135,42,0.38)`,
              }}>
                Log extraction
              </button>
            </div>
          )}
          {phase === 'idle' && (
            <button onClick={() => setManualMode(m => !m)} style={{
              background:'none', border:'none', cursor:'pointer',
              fontSize:13, color: manualMode ? C.ca500 : C.e400, fontWeight:500,
              textDecoration:'none', padding:'4px 0',
            }}>
              {manualMode ? '← Use live timer instead' : 'Add time manually'}
            </button>
          )}
        </div>
      </div>

      {/* Sub-sheets */}
      {showBean && <BeanSubSheet selected={bean} onSelect={setBean} onClose={() => setShowBean(false)}/>}
      {showGear && <GearSubSheet selected={gear} onSave={setGear} onClose={() => setShowGear(false)}/>}
    </div>
  );
}

          </button>
        </div>
        <div style={{ padding:'0 18px 32px', display:'flex', flexDirection:'column', gap:10 }}>
          {RECENTS.map(ex => <RecentCard key={ex.id} ex={ex}/>)}
        </div>
      </div>

      <BottomNav active={nav} setActive={setNav}/>

      {modal && <ExtractionModal onClose={closeModal} onSaved={onSaved}/>}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

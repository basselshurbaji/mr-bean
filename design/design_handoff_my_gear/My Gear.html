<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Bean — My Gear</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #2D1810;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.phone {
  width: 390px; height: 844px; background: #FDF8F2; border-radius: 54px; position: relative;
  box-shadow: 0 0 0 2px #3A200E, 0 0 0 8px #1C0F07, 0 32px 80px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
}
.notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #1C0F07; border-radius: 0 0 22px 22px; z-index: 100; }

/* Layout regions */
.status-bar { position: absolute; top: 0; left: 0; right: 0; height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 30px 10px; z-index: 10; }
.main-scroll { position: absolute; top: 54px; bottom: 88px; left: 0; right: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.main-scroll::-webkit-scrollbar { display: none; }
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 88px; background: rgba(253,248,242,0.94); backdrop-filter: blur(20px); border-top: 1px solid #F0E4CC; display: flex; align-items: flex-start; justify-content: space-around; padding-top: 12px; z-index: 50; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 14px; border-radius: 12px; background: none; border: none; outline: none; transition: transform 150ms ease; }
.nav-item:active { transform: scale(0.91); }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.03em; }
.nav-item.active .nav-label { color: #1C0F07; }
.nav-item:not(.active) .nav-label { color: #C4A882; }

/* Sheet */
.backdrop { position: absolute; inset: 0; background: rgba(28,15,7,0.42); z-index: 80; display: flex; align-items: flex-end; }
.sheet { width: 100%; background: #FDF8F2; border-radius: 28px 28px 0 0; box-shadow: 0 -4px 32px rgba(28,15,7,0.16); max-height: 92%; overflow-y: auto; animation: slideUp 300ms cubic-bezier(0.33,1,0.68,1); }
.sheet::-webkit-scrollbar { display: none; }
.handle { width: 36px; height: 4px; background: #D8C4A0; border-radius: 9999px; margin: 14px auto 22px; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Forms */
.field-label { font-size: 13px; font-weight: 500; color: #6B3A2A; display: block; margin-bottom: 6px; }
.input { height: 50px; padding: 0 16px; width: 100%; background: #FAF3E8; border: 1.5px solid #E8D8B8; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: #1C0F07; outline: none; transition: border-color 150ms, box-shadow 150ms; }
.input:focus { border-color: #D4872A; box-shadow: 0 0 0 3px rgba(212,135,42,0.12); }
.input::placeholder { color: #C4A882; }
textarea.input { height: auto; padding: 14px 16px; resize: none; line-height: 1.5; }
select.input { appearance: none; cursor: pointer; }

/* Buttons */
.btn-primary { height: 54px; border-radius: 32px; border: none; background: #1C0F07; color: #FDF8F2; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: transform 150ms, background 150ms; }
.btn-primary:active { transform: scale(0.97); background: #2D1810; }
.btn-primary:disabled { opacity: 0.38; cursor: default; }

/* Toast */
.toast { position: absolute; bottom: 104px; left: 20px; right: 20px; background: #1C0F07; color: #FDF8F2; border-radius: 16px; padding: 14px 18px; font-size: 14px; font-weight: 500; z-index: 200; text-align: center; animation: slideUp 260ms cubic-bezier(0.33,1,0.68,1); }

/* Misc */
.display { font-family: 'Playfair Display', serif; }
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
.screen-push { animation: pushIn 260ms cubic-bezier(0.33,1,0.68,1); }
@keyframes pushIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.chip-scroll { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; }
.chip-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div id="root" style="width:100%;height:100%;position:relative;"></div>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Equipment type definitions + icons ───────────────────────────────────────
const GIcon = ({ size = 24, color = "currentColor", strokeWidth = 1.8, children }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    {children}
  </svg>
);

const typeIcons = {
  machine: (size, color) => (
    <GIcon size={size} color={color}>
      {/* body */}
      <rect x="2" y="8" width="20" height="12" rx="2.5"/>
      {/* group head */}
      <rect x="7" y="18" width="10" height="3" rx="1"/>
      {/* divider */}
      <line x1="2" y1="12" x2="22" y2="12"/>
      {/* pressure gauge */}
      <circle cx="6.5" cy="10" r="1.5"/>
      {/* brew button */}
      <circle cx="17.5" cy="10" r="1"/>
      {/* steam wand */}
      <path d="M22 10 Q25 10 25 14" stroke={color} strokeWidth="1.8"/>
      <path d="M21 14 L23 17" stroke={color} strokeWidth="1.8"/>
    </GIcon>
  ),
  grinder: (size, color) => (
    <GIcon size={size} color={color}>
      {/* hopper */}
      <path d="M8.5 10 L10.5 3.5 L13.5 3.5 L15.5 10 Z"/>
      {/* body */}
      <rect x="7" y="10" width="10" height="9" rx="2"/>
      {/* burr line */}
      <line x1="7" y1="13.5" x2="17" y2="13.5"/>
      {/* output */}
      <rect x="10" y="19" width="4" height="2.5" rx="1"/>
    </GIcon>
  ),
  scale: (size, color) => (
    <GIcon size={size} color={color}>
      {/* base */}
      <rect x="2" y="17" width="20" height="4" rx="2"/>
      {/* platform */}
      <rect x="4" y="13.5" width="16" height="4" rx="1.5"/>
      {/* display */}
      <rect x="6" y="7" width="12" height="6" rx="1.5"/>
      {/* value line */}
      <line x1="9" y1="10" x2="15" y2="10"/>
    </GIcon>
  ),
  portafilter: (size, color) => (
    <GIcon size={size} color={color}>
      {/* Outer rim */}
      <circle cx="12" cy="10" r="8"/>
      {/* Inner wall ring — gives depth */}
      <circle cx="12" cy="10" r="6" strokeWidth="1" opacity="0.4"/>
      {/* Highlight arc top-left — light catching the rim */}
      <path d="M7 7 A6 6 0 0 1 12 4" strokeWidth="1.5" opacity="0.5" strokeLinecap="round"/>
      {/* Mesh dots inside basket */}
      <circle cx="12" cy="10" r="1"   fill={color} stroke="none"/>
      <circle cx="9"  cy="8"  r="0.8" fill={color} stroke="none" opacity="0.9"/>
      <circle cx="15" cy="8"  r="0.8" fill={color} stroke="none" opacity="0.9"/>
      <circle cx="9"  cy="12" r="0.8" fill={color} stroke="none" opacity="0.9"/>
      <circle cx="15" cy="12" r="0.8" fill={color} stroke="none" opacity="0.9"/>
      <circle cx="12" cy="6.2"  r="0.7" fill={color} stroke="none" opacity="0.7"/>
      <circle cx="12" cy="13.8" r="0.7" fill={color} stroke="none" opacity="0.7"/>
      {/* Double handle downward */}
      <line x1="10" y1="18" x2="10" y2="23" strokeWidth="2" strokeLinecap="round"/>
      <line x1="14" y1="18" x2="14" y2="23" strokeWidth="2" strokeLinecap="round"/>
    </GIcon>
  ),
  tamper: (size, color) => (
    <GIcon size={size} color={color}>
      {/* ergonomic handle top */}
      <path d="M9.5 2 C9.5 1 14.5 1 14.5 2 L14.5 7 C14.5 8 13 9 12 9 C11 9 9.5 8 9.5 7 Z"/>
      {/* neck */}
      <rect x="10.5" y="9" width="3" height="5"/>
      {/* base puck */}
      <rect x="6" y="14" width="12" height="5" rx="1.5"/>
    </GIcon>
  ),
  distributor: (size, color) => (
    <GIcon size={size} color={color}>
      {/* outer ring */}
      <circle cx="12" cy="14" r="7.5"/>
      {/* 6 radial arms */}
      <line x1="12" y1="6.5" x2="12" y2="14"/>
      <line x1="18.5" y1="10.5" x2="12" y2="14"/>
      <line x1="18.5" y1="17.5" x2="12" y2="14"/>
      <line x1="12" y1="21.5" x2="12" y2="14"/>
      <line x1="5.5" y1="17.5" x2="12" y2="14"/>
      <line x1="5.5" y1="10.5" x2="12" y2="14"/>
      {/* center hub */}
      <circle cx="12" cy="14" r="2" fill={color} stroke="none"/>
      {/* handle */}
      <line x1="12" y1="2" x2="12" y2="6.5" strokeWidth="2.5"/>
    </GIcon>
  ),
  wdt: (size, color) => (
    <GIcon size={size} color={color}>
      {/* handle body */}
      <path d="M10 2 C10 1 14 1 14 2 L14 11 L10 11 Z"/>
      {/* needle fan */}
      <line x1="10" y1="11" x2="5"  y2="22"/>
      <line x1="11" y1="11" x2="9"  y2="22"/>
      <line x1="12" y1="11" x2="12" y2="22"/>
      <line x1="13" y1="11" x2="15" y2="22"/>
      <line x1="14" y1="11" x2="19" y2="22"/>
    </GIcon>
  ),
  basket: (size, color) => (
    <GIcon size={size} color={color}>
      {/* rim */}
      <line x1="3" y1="7" x2="21" y2="7"/>
      {/* tapered bowl */}
      <path d="M4 7 L6.5 19 C6.5 20.5 17.5 20.5 17.5 19 L20 7"/>
      {/* mesh dots */}
      <circle cx="9" cy="13" r="0.9" fill={color} stroke="none"/>
      <circle cx="12" cy="13" r="0.9" fill={color} stroke="none"/>
      <circle cx="15" cy="13" r="0.9" fill={color} stroke="none"/>
      <circle cx="10.5" cy="16.5" r="0.9" fill={color} stroke="none"/>
      <circle cx="13.5" cy="16.5" r="0.9" fill={color} stroke="none"/>
    </GIcon>
  ),
  puckscreen: (size, color) => (
    <GIcon size={size} color={color}>
      {/* outer ring */}
      <circle cx="12" cy="12" r="9"/>
      {/* inner ring */}
      <circle cx="12" cy="12" r="4.5"/>
      {/* center dot */}
      <circle cx="12" cy="12" r="1.2" fill={color} stroke="none"/>
      {/* mesh ring dots */}
      <circle cx="12" cy="7" r="0.8" fill={color} stroke="none"/>
      <circle cx="16.5" cy="9" r="0.8" fill={color} stroke="none"/>
      <circle cx="16.5" cy="15" r="0.8" fill={color} stroke="none"/>
      <circle cx="12" cy="17" r="0.8" fill={color} stroke="none"/>
      <circle cx="7.5"  cy="15" r="0.8" fill={color} stroke="none"/>
      <circle cx="7.5"  cy="9" r="0.8" fill={color} stroke="none"/>
    </GIcon>
  ),
  other: (size, color) => (
    <GIcon size={size} color={color}>
      <circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="8" x2="12" y2="13"/>
      <circle cx="12" cy="16" r="0.8" fill={color} stroke="none"/>
    </GIcon>
  ),
};

const TYPES = [
  { id: 'machine',     label: 'Espresso machine'  },
  { id: 'grinder',     label: 'Grinder'           },
  { id: 'scale',       label: 'Scale'             },
  { id: 'portafilter', label: 'Portafilter'       },
  { id: 'tamper',      label: 'Tamper'            },
  { id: 'distributor', label: 'Distribution tool' },
  { id: 'wdt',         label: 'WDT tool'          },
  { id: 'basket',      label: 'Basket'            },
  { id: 'puckscreen',  label: 'Puck screen'       },
  { id: 'other',       label: 'Other'             },
];
const typeById = id => TYPES.find(t => t.id === id) || TYPES[TYPES.length - 1];
const renderIcon = (id, size, color) => (typeIcons[id] || typeIcons.other)(size, color);

// ─── Seed data ────────────────────────────────────────────────────────────────
const uid = () => 'g' + Math.random().toString(36).slice(2, 7);

const INIT_GEAR = [
  { id:'g1', typeId:'machine',     name:'Linea Micra',       brand:'La Marzocco', model:'Linea Micra',       year:'2023', notes:'PID at 93 °C. Runs beautifully quiet.' },
  { id:'g2', typeId:'grinder',     name:'Niche Zero',        brand:'Niche',       model:'Zero',              year:'2022', notes:'Single dose. Swapped to 64 mm flat burrs.' },
  { id:'g3', typeId:'scale',       name:'Acaia Pearl S',     brand:'Acaia',       model:'Pearl S',           year:'2023', notes:'Auto-tare on. Bluetooth connected.' },
  { id:'g4', typeId:'portafilter', name:'IMS Competition',   brand:'IMS',         model:'Competition 58.5',  year:'2023', notes:'' },
  { id:'g5', typeId:'tamper',      name:'Normcore V4',       brand:'Normcore',    model:'Spring V4',         year:'2022', notes:'29.5 lb calibrated.' },
  { id:'g6', typeId:'puckscreen',  name:'58 mm Puck Screen', brand:'IMS',         model:'58 mm',             year:'2024', notes:'' },
  { id:'g7', typeId:'basket',      name:'VST 18 g Basket',   brand:'VST',         model:'18 g ridgeless',    year:'2022', notes:'My go-to for light roasts.' },
  { id:'g8', typeId:'wdt',         name:'WDT Tool',          brand:'Barista Hustle', model:'Blind Shaker',   year:'2023', notes:'' },
];

const INIT_STATIONS = [
  { id:'s1', name:'Daily driver',  gearIds: ['g1','g2','g3','g4','g5','g6','g7'] },
  { id:'s2', name:'Weekend light', gearIds: ['g1','g2','g3','g7','g8'] },
];

// ─── Tiny components ──────────────────────────────────────────────────────────
const StatusBar = () => (
  <div className="status-bar">
    <span style={{ fontSize:15, fontWeight:600, color:'#1C0F07', letterSpacing:'-0.2px' }}>9:41</span>
    <span style={{ fontSize:12, color:'#1C0F07', opacity:0.7 }}>●●● WiFi ▪▪</span>
  </div>
);

const NAV = [
  { id:'home',  label:'Home',    d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10' },
  { id:'gear',  label:'My Gear', d:'M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z' },
  { id:'beans', label:'Beans',   d:'M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z' },
  { id:'stats', label:'Stats',   d:'M18 20V10 M12 20V4 M6 20v-6' },
];

const BottomNav = ({ active, onNav }) => (
  <nav className="bottom-nav">
    {NAV.map(it => (
      <button key={it.id} className={`nav-item ${active===it.id?'active':''}`} onClick={() => onNav(it.id)}>
        <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
          stroke={active===it.id?'#1C0F07':'#C4A882'}
          strokeWidth={active===it.id?2.5:2} strokeLinecap="round" strokeLinejoin="round">
          <path d={it.d}/>
        </svg>
        <span className="nav-label">{it.label}</span>
      </button>
    ))}
  </nav>
);

const CloseBtn = ({ onClick }) => (
  <button onClick={onClick} style={{ width:34, height:34, borderRadius:17, background:'#F0E4CC', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
    <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="#6B3A2A" strokeWidth={2.5} strokeLinecap="round"><path d="M18 6L6 18 M6 6l12 12"/></svg>
  </button>
);

const BackBtn = ({ onClick }) => (
  <button onClick={onClick} style={{ width:38, height:38, borderRadius:19, background:'#F0E4CC', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
    <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#1C0F07" strokeWidth={2} strokeLinecap="round"><path d="M19 12H5 M12 19l-7-7 7-7"/></svg>
  </button>
);

// Gear icon bubble
const Bubble = ({ typeId, size = 48, iconSize = 24, dark = false }) => {
  const bg = dark ? '#1C0F07' : '#F0E4CC';
  const color = dark ? '#FDF8F2' : '#1C0F07';
  return (
    <div style={{ width:size, height:size, borderRadius:size*0.38, background:bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      {renderIcon(typeId, iconSize, color)}
    </div>
  );
};

// ─── Add Gear Sheet ───────────────────────────────────────────────────────────
const AddGearSheet = ({ onClose, onSave, existing }) => {
  const [step, setStep] = useState(existing ? 2 : 1);
  const [typeId, setTypeId] = useState(existing ? existing.typeId : null);
  const [form, setForm] = useState(
    existing
      ? { name: existing.name, brand: existing.brand, model: existing.model, year: existing.year, notes: existing.notes }
      : { name:'', brand:'', model:'', year:'', notes:'' }
  );
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const canSave = form.name.trim().length > 0;

  const handleSave = () => {
    if (!canSave) return;
    onSave({ id: existing ? existing.id : uid(), typeId, ...form });
    onClose();
  };

  return (
    <div className="backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="handle"/>
        <div style={{ padding:'0 24px' }}>

          {/* Header */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24 }}>
            <div>
              {step === 2 && (
                <button onClick={() => setStep(1)} style={{ background:'none', border:'none', cursor:'pointer', color:'#C4782A', fontSize:13, fontWeight:600, padding:0, marginBottom:6, display:'flex', alignItems:'center', gap:4 }}>
                  <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5} strokeLinecap="round"><path d="M19 12H5 M12 19l-7-7 7-7"/></svg>
                  Back
                </button>
              )}
              <h2 className="display" style={{ fontSize:24, fontWeight:700, color:'#1C0F07', lineHeight:1.1 }}>
                {step === 1 ? "What are you adding?" : (existing ? "Edit gear" : "Tell me about it")}
              </h2>
              {step === 2 && typeId && (
                <p style={{ fontSize:13, color:'#8C5340', marginTop:4 }}>{typeById(typeId).label}</p>
              )}
            </div>
            <CloseBtn onClick={onClose}/>
          </div>

          {/* Step 1 — type grid */}
          {step === 1 && (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, paddingBottom:32 }}>
              {TYPES.map(t => (
                <button key={t.id} onClick={() => { setTypeId(t.id); setStep(2); }} style={{
                  background:'#FAF3E8', border:'1.5px solid #E8D8B8', borderRadius:18,
                  padding:'16px 8px 14px', display:'flex', flexDirection:'column', alignItems:'center', gap:10,
                  cursor:'pointer', transition:'all 150ms', fontFamily:'DM Sans,sans-serif'
                }}
                onMouseEnter={e => { e.currentTarget.style.background='#F0E4CC'; e.currentTarget.style.borderColor='#D8C4A0'; }}
                onMouseLeave={e => { e.currentTarget.style.background='#FAF3E8'; e.currentTarget.style.borderColor='#E8D8B8'; }}
                onMouseDown={e => { e.currentTarget.style.transform='scale(0.95)'; }}
                onMouseUp={e => { e.currentTarget.style.transform='scale(1)'; }}>
                  {renderIcon(t.id, 30, '#1C0F07')}
                  <span style={{ fontSize:10, fontWeight:600, color:'#1C0F07', textAlign:'center', lineHeight:1.3, letterSpacing:'0.01em' }}>
                    {t.label}
                  </span>
                </button>
              ))}
            </div>
          )}

          {/* Step 2 — form */}
          {step === 2 && (
            <div style={{ paddingBottom:32 }}>
              <div style={{ marginBottom:16 }}>
                <label className="field-label">Name <span style={{ color:'#C4782A' }}>*</span></label>
                <input className="input" placeholder={typeId === 'machine' ? 'e.g. Linea Micra' : typeId === 'grinder' ? 'e.g. Niche Zero' : 'Give it a name'} value={form.name} onChange={e => upd('name', e.target.value)} autoFocus/>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
                <div>
                  <label className="field-label">Brand</label>
                  <input className="input" placeholder="e.g. La Marzocco" value={form.brand} onChange={e => upd('brand', e.target.value)}/>
                </div>
                <div>
                  <label className="field-label">Model</label>
                  <input className="input" placeholder="e.g. GS/3" value={form.model} onChange={e => upd('model', e.target.value)}/>
                </div>
              </div>
              <div style={{ marginBottom:16 }}>
                <label className="field-label">Year purchased</label>
                <input className="input" placeholder="e.g. 2023" value={form.year} onChange={e => upd('year', e.target.value)} maxLength={4}/>
              </div>
              <div style={{ marginBottom:28 }}>
                <label className="field-label">Notes</label>
                <textarea className="input" rows={3} placeholder="Settings, mods, quirks — anything worth remembering" value={form.notes} onChange={e => upd('notes', e.target.value)}/>
              </div>
              <button className="btn-primary" onClick={handleSave} disabled={!canSave}>
                {existing ? 'Save changes' : 'Add to my gear'}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── Add / Edit Station Sheet ─────────────────────────────────────────────────
const StationSheet = ({ gear, existing, onClose, onSave, onDelete }) => {
  const [name, setName] = useState(existing ? existing.name : '');
  const [selected, setSelected] = useState(new Set(existing ? existing.gearIds : []));

  const sortedGear = React.useMemo(() =>
    [...gear].sort((a, b) => {
      const aOn = selected.has(a.id), bOn = selected.has(b.id);
      return aOn === bOn ? 0 : aOn ? -1 : 1;
    })
  , [gear]); // intentionally excludes `selected` — sort once on open

  const toggle = id => setSelected(prev => {
    const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s;
  });

  const handleSave = () => {
    if (!name.trim()) return;
    onSave({ id: existing ? existing.id : uid(), name: name.trim(), gearIds: [...selected] });
    onClose();
  };

  return (
    <div className="backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="handle"/>
        <div style={{ padding:'0 24px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
            <h2 className="display" style={{ fontSize:24, fontWeight:700, color:'#1C0F07' }}>
              {existing ? 'Edit station' : 'New station'}
            </h2>
            <CloseBtn onClick={onClose}/>
          </div>

          <div style={{ marginBottom:20 }}>
            <label className="field-label">Station name <span style={{ color:'#C4782A' }}>*</span></label>
            <input className="input" placeholder="e.g. Daily driver" value={name} onChange={e => setName(e.target.value)} autoFocus/>
          </div>

          <p style={{ fontSize:13, fontWeight:500, color:'#6B3A2A', marginBottom:12 }}>
            Select gear for this station
          </p>
          <p style={{ fontSize:12, color:'#B07060', marginBottom:16 }}>
            Stations pre-select tools when logging — you can always tweak before saving a shot.
          </p>

          {gear.length === 0 ? (
            <div style={{ textAlign:'center', padding:'28px 0 20px', color:'#B07060' }}>
              <div style={{ fontSize:32, marginBottom:8 }}>🔧</div>
              <div style={{ fontSize:13 }}>Add some gear first, then build stations.</div>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:28 }}>
              {sortedGear.map(item => {
                const on = selected.has(item.id);
                return (
                  <button key={item.id} onClick={() => toggle(item.id)} style={{
                    display:'flex', alignItems:'center', gap:12,
                    background: on ? '#1C0F07' : '#FAF3E8',
                    border:'1.5px solid', borderColor: on ? '#1C0F07' : '#E8D8B8',
                    borderRadius:16, padding:'12px 16px', cursor:'pointer',
                    textAlign:'left', transition:'all 150ms', fontFamily:'DM Sans,sans-serif'
                  }}>
                    <Bubble typeId={item.typeId} size={38} iconSize={19} dark={on}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:600, color: on ? '#FDF8F2' : '#1C0F07' }}>{item.name}</div>
                      {item.brand && <div style={{ fontSize:12, color: on ? '#C4A882' : '#8C5340', marginTop:1 }}>{item.brand}{item.model ? ` · ${item.model}` : ''}</div>}
                    </div>
                    <div style={{ width:20, height:20, borderRadius:10, border:`2px solid ${on?'#D4872A':'#D8C4A0'}`, background:on?'#D4872A':'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      {on && <svg width={10} height={10} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth={3} strokeLinecap="round"><path d="M20 6L9 17 4 12"/></svg>}
                    </div>
                  </button>
                );
              })}
            </div>
          )}

          <button className="btn-primary" onClick={handleSave} disabled={!name.trim()} style={{ marginBottom:12 }}>
            {existing ? 'Save changes' : (selected.size > 0 ? `Create station · ${selected.size} item${selected.size!==1?'s':''}` : 'Create station')}
          </button>
          {existing && onDelete && (
            <button onClick={() => { onDelete(existing.id); onClose(); }} style={{ width:'100%', height:46, borderRadius:32, border:'1.5px solid #FDECEA', background:'#FDECEA', color:'#C0392B', fontFamily:'DM Sans,sans-serif', fontSize:14, fontWeight:600, cursor:'pointer', marginBottom:8 }}>
              Delete station
            </button>
          )}
          <div style={{ height:16 }}/>
        </div>
      </div>
    </div>
  );
};

// ─── Gear Detail ──────────────────────────────────────────────────────────────

          onMouseEnter={e => e.currentTarget.style.background='#f5c6c2'}
          onMouseLeave={e => e.currentTarget.style.background='#FDECEA'}>
          Remove from my gear

// ─── Gear List ────────────────────────────────────────────────────────────────
const GearList = ({ gear, onSelect }) => {
  const [filter, setFilter] = useState('all');
  const presentTypes = [...new Set(gear.map(g => g.typeId))];
  const filtered = filter === 'all' ? gear : gear.filter(g => g.typeId === filter);

  return (
    <div>
      {/* Filter chips */}
      <div className="chip-scroll">
        {[{ id:'all', label:'All' }, ...TYPES.filter(t => presentTypes.includes(t.id))].map(t => {
          const active = filter === t.id;
          return (
            <button key={t.id} onClick={() => setFilter(t.id)} style={{
              flexShrink:0, height:32, padding:'0 14px', borderRadius:9999,
              border:`1.5px solid ${active?'#1C0F07':'#E8D8B8'}`,
              background: active ? '#1C0F07' : 'transparent',
              color: active ? '#FDF8F2' : '#6B3A2A',
              fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'DM Sans,sans-serif',
              whiteSpace:'nowrap', transition:'all 150ms'
            }}>
              {t.label || 'All'}

        <div style={{ textAlign:'center', padding:'52px 24px', color:'#B07060' }}>

          <div style={{ fontSize:16, fontWeight:600, color:'#1C0F07', marginBottom:6 }}>No gear yet</div>
          <div style={{ fontSize:13 }}>No beans on deck. Time to fix that, don't you think?</div>
        </div>

      {filtered.length > 0 && (
        <div style={{ display:'flex', flexDirection:'column', gap:10, padding:'0 20px' }}>
          {filtered.map(item => (
            <button key={item.id} onClick={() => onSelect(item)} style={{ background:'#FAF3E8', borderRadius:20, padding:'14px 16px', boxShadow:'0 2px 8px rgba(28,15,7,0.07)', border:'none', cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:14, transition:'transform 150ms' }}
              onMouseDown={e => e.currentTarget.style.transform='scale(0.98)'}
              onMouseUp={e => e.currentTarget.style.transform='scale(1)'}
              onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
              <Bubble typeId={item.typeId} size={50} iconSize={25}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:15, fontWeight:600, color:'#1C0F07' }}>{item.name}</div>
                {item.brand && <div style={{ fontSize:12, color:'#8C5340', marginTop:2 }}>{item.brand}{item.model ? ` · ${item.model}` : ''}</div>}
              </div>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6 }}>
                <span className="badge" style={{ background:'#F0E4CC', color:'#4A2518', fontSize:10 }}>{typeById(item.typeId).label}</span>
                {item.year && <span style={{ fontSize:11, color:'#C4A882' }}>{item.year}</span>}
              </div>
            </button>
          ))}
        </div>
      )}
      <div style={{ height:80 }}/>
    </div>
  );
};

// ─── Stations Tab ─────────────────────────────────────────────────────────────

  <div style={{ padding:'0 20px', display:'flex', flexDirection:'column', gap:12 }}>
    {stations.length === 0 && (
      <div style={{ textAlign:'center', padding:'48px 0', color:'#B07060' }}>
        <div style={{ fontSize:40, marginBottom:14 }}>⚙️</div>
        <div style={{ fontSize:16, fontWeight:600, color:'#1C0F07', marginBottom:6 }}>No stations yet</div>

          cursor:'pointer', textAlign:'left', width:'100%', transition:'transform 150ms'

        onMouseUp={e => e.currentTarget.style.transform='scale(1)'}

            <div style={{ fontSize:16, fontWeight:600, color:'#1C0F07' }}>{station.name}</div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:12, color:'#8C5340', fontWeight:500 }}>{items.length} item{items.length!==1?'s':''}</span>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#C4A882" strokeWidth={2} strokeLinecap="round"><path d="M9 18l6-6-6-6"/></svg>

          {/* Gear icon strip */}
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            {items.slice(0, 7).map(item => (
              <div key={item.id} style={{ width:36, height:36, borderRadius:10, background:'#F0E4CC', display:'flex', alignItems:'center', justifyContent:'center' }}>

      onMouseEnter={e => { e.currentTarget.style.background='#F0E4CC'; e.currentTarget.style.borderColor='#C4A882'; }}
      onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.borderColor='#D8C4A0'; }}>
      + New station
    </button>
    <div style={{ height:20 }}/>

);

// ─── My Gear Screen ───────────────────────────────────────────────────────────
const GearScreen = ({ gear, stations, onAddGear, onAddStation, onEditStation, onDeleteGear, onEditGear }) => {
  const [tab, setTab] = useState('gear');
  const [detail, setDetail] = useState(null);

  const liveDetail = detail ? (gear.find(g => g.id === detail.id) || null) : null;
  const handleDelete = id => { onDeleteGear(id); setDetail(null); };

  if (liveDetail) {
    return (
      <GearDetail item={liveDetail} onBack={() => setDetail(null)}
        onDelete={() => handleDelete(liveDetail.id)}
        onEdit={() => onEditGear(liveDetail)}/>
    );
  }

  return (
    <div>
      {/* Header */}
      <div style={{ padding:'12px 24px 0' }}>
        <h1 className="display" style={{ fontSize:34, fontWeight:900, color:'#1C0F07', letterSpacing:'-0.7px', lineHeight:1.1 }}>My Gear</h1>
        <p style={{ fontSize:13, color:'#8C5340', marginTop:5, marginBottom:20 }}>
          {gear.length} piece{gear.length!==1?'s':''} · {stations.length} station{stations.length!==1?'s':''}
        </p>
        {/* Tab switcher */}
        <div style={{ display:'flex', background:'#F0E4CC', borderRadius:14, padding:4, marginBottom:20 }}>
          {[['gear','Gear'],['stations','Stations']].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} style={{
              flex:1, height:36, borderRadius:10, border:'none', cursor:'pointer',
              background: tab===id ? '#FDF8F2' : 'transparent',
              color: tab===id ? '#1C0F07' : '#8C5340',
              fontSize:13, fontWeight:600, fontFamily:'DM Sans,sans-serif',
              boxShadow: tab===id ? '0 1px 4px rgba(28,15,7,0.1)' : 'none',
              transition:'all 150ms'
            }}>{label}</button>
          ))}
        </div>
      </div>

      {tab === 'gear' && <GearList gear={gear} onSelect={setDetail}/>}
      {tab === 'stations' && <StationsTab stations={stations} gear={gear} onAddStation={onAddStation} onEditStation={onEditStation} onDeleteStation={() => {}}/>}
    </div>
  );
};

// ─── Tweaks ───────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "list"
}/*EDITMODE-END*/;

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [nav, setNav] = useState(() => localStorage.getItem('mrbean_nav') || 'gear');
  const [gear, setGear] = useState(() => { try { return JSON.parse(localStorage.getItem('mrbean_gear2')) || INIT_GEAR; } catch { return INIT_GEAR; }});
  const [stations, setStations] = useState(() => { try { return JSON.parse(localStorage.getItem('mrbean_stations2')) || INIT_STATIONS; } catch { return INIT_STATIONS; }});
  const [sheet, setSheet] = useState(null); // null | 'add-gear' | 'add-station' | stationObj
  const [toast, setToast] = useState(null);
  const [tweaks, setTweaks] = useState(() => { try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('mrbean_tweaks2') || '{}') }; } catch { return { ...TWEAK_DEFAULTS }; }});
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => { localStorage.setItem('mrbean_nav', nav); }, [nav]);
  useEffect(() => { localStorage.setItem('mrbean_gear2', JSON.stringify(gear)); }, [gear]);
  useEffect(() => { localStorage.setItem('mrbean_stations2', JSON.stringify(stations)); }, [stations]);
  useEffect(() => { localStorage.setItem('mrbean_tweaks2', JSON.stringify(tweaks)); }, [tweaks]);

  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  const setTweak = (k, v) => {
    setTweaks(t => { const n = { ...t, [k]: v }; window.parent.postMessage({ type:'__edit_mode_set_keys', edits: n }, '*'); return n; });
  };

  const addGear = item => { setGear(g => [...g, item]); showToast(`${item.name} added to your gear ✓`); };
  const saveGear = item => {
    setGear(g => { const i = g.findIndex(x => x.id === item.id); if (i >= 0) { const a = [...g]; a[i] = item; return a; } return [...g, item]; });
    showToast(`${item.name} updated ✓`);
  };
  const deleteGear = id => {
    setGear(g => g.filter(x => x.id !== id));
    setStations(s => s.map(st => ({ ...st, gearIds: st.gearIds.filter(x => x !== id) })));
    showToast('Removed from your gear.');
  };
  const saveStation = station => {
    setStations(prev => {
      const i = prev.findIndex(s => s.id === station.id);
      if (i >= 0) { const a = [...prev]; a[i] = station; return a; }
      return [...prev, station];
    });
    showToast(`"${station.name}" saved ✓`);
  };
  const deleteStation = id => {
    setStations(s => s.filter(x => x.id !== id));
    showToast('Station deleted.');
  };

  const isStationObj = s => s && typeof s === 'object' && s.gearIds && !s.__editGear;

  return (
    <div style={{ width:'100%', height:'100%', position:'relative' }}>
      <StatusBar/>

      {/* Main scroll area */}
      <div className="main-scroll">
        {nav === 'gear' ? (
          <GearScreen
            gear={gear} stations={stations}
            onAddGear={() => setSheet('add-gear')}
            onAddStation={() => setSheet('add-station')}
            onEditStation={s => setSheet(s)}
            onDeleteGear={deleteGear}
            onEditGear={item => setSheet({ __editGear: true, ...item })}
          />
        ) : (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', minHeight:400, color:'#C4A882' }}>
            <div style={{ fontSize:36, marginBottom:14 }}>☕</div>
            <div style={{ fontSize:14, fontWeight:500 }}>Tap My Gear to explore</div>
          </div>
        )}
      </div>

      <BottomNav active={nav} onNav={setNav}/>

      {/* FAB — only on gear tab */}
      {nav === 'gear' && (
        <button onClick={() => setSheet('add-gear')} style={{ position:'absolute', bottom:100, right:22, width:56, height:56, borderRadius:28, background:'#1C0F07', border:'none', cursor:'pointer', zIndex:60, boxShadow:'0 6px 20px rgba(28,15,7,0.38)', display:'flex', alignItems:'center', justifyContent:'center', transition:'transform 220ms cubic-bezier(0.34,1.56,0.64,1)' }}
          onMouseDown={e => e.currentTarget.style.transform='scale(0.93)'}
          onMouseUp={e => e.currentTarget.style.transform='scale(1)'}
          onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
          <svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke="#FDF8F2" strokeWidth={2.5} strokeLinecap="round"><path d="M12 5v14 M5 12h14"/></svg>
        </button>
      )}

      {/* Sheets */}
      {sheet === 'add-gear' && <AddGearSheet onClose={() => setSheet(null)} onSave={addGear}/>}
      {sheet && sheet.__editGear && <AddGearSheet existing={sheet} onClose={() => setSheet(null)} onSave={saveGear}/>}
      {(sheet === 'add-station' || isStationObj(sheet)) && (
        <StationSheet
          gear={gear}
          existing={isStationObj(sheet) ? sheet : null}
          onClose={() => setSheet(null)}
          onSave={saveStation}
          onDelete={deleteStation}
        />
      )}

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{ position:'absolute', bottom:96, right:12, background:'#1C0F07', borderRadius:18, padding:'16px 18px', zIndex:300, width:190, boxShadow:'0 8px 32px rgba(0,0,0,0.45)', animation:'slideUp 200ms cubic-bezier(0.33,1,0.68,1)' }}>
          <p style={{ fontSize:11, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color:'#D4872A', marginBottom:14 }}>Tweaks</p>

          <p style={{ fontSize:10, color:'#6B4030', lineHeight:1.5 }}>More tweaks coming as the app grows.</p>
          <div style={{ height:10, background:'#2D1810', margin:'14px -18px', borderTop:'1px solid #3A1E10' }}/>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:'#6B4030', marginBottom:8 }}>Dev tools</p>
          <button onClick={() => {
            localStorage.removeItem('mrbean_gear2');
            localStorage.removeItem('mrbean_stations2');
            setGear(INIT_GEAR);
            setStations(INIT_STATIONS);
            showToast('Data reset to defaults.');
          }} style={{ width:'100%', height:32, borderRadius:8, border:'none', background:'#3A1E10', color:'#D4872A', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'DM Sans,sans-serif' }}>
            ↺ Reset gear data
          </button>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

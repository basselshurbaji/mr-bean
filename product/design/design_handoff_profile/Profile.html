<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Bean — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #2D1810;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.phone {
  width: 390px; height: 844px; background: #FDF8F2; border-radius: 54px; position: relative;
  box-shadow: 0 0 0 2px #3A200E, 0 0 0 8px #1C0F07, 0 32px 80px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
}
.notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #1C0F07; border-radius: 0 0 22px 22px; z-index: 100; }
.status-bar { position: absolute; top: 0; left: 0; right: 0; height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 30px 10px; z-index: 10; }
.main-scroll { position: absolute; top: 54px; bottom: 88px; left: 0; right: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.main-scroll::-webkit-scrollbar { display: none; }
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 88px; background: rgba(253,248,242,0.94); backdrop-filter: blur(20px); border-top: 1px solid #F0E4CC; display: flex; align-items: flex-start; justify-content: space-around; padding-top: 12px; z-index: 50; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 14px; border-radius: 12px; background: none; border: none; outline: none; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.03em; }
.field-label { font-size: 13px; font-weight: 500; color: #6B3A2A; display: block; margin-bottom: 6px; }
.input { height: 50px; padding: 0 16px; width: 100%; background: #FAF3E8; border: 1.5px solid #E8D8B8; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: #1C0F07; outline: none; transition: border-color 150ms, box-shadow 150ms; }
.input:focus { border-color: #D4872A; box-shadow: 0 0 0 3px rgba(212,135,42,0.12); }
.input::placeholder { color: #C4A882; }
.btn-primary { height: 50px; border-radius: 32px; border: none; background: #1C0F07; color: #FDF8F2; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: transform 150ms; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.38; cursor: default; }
.display { font-family: 'Playfair Display', serif; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.toast { position: absolute; bottom: 104px; left: 20px; right: 20px; background: #1C0F07; color: #FDF8F2; border-radius: 16px; padding: 14px 18px; font-size: 14px; font-weight: 500; z-index: 200; text-align: center; animation: slideUp 260ms cubic-bezier(0.33,1,0.68,1); }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <span style="font-size:15px;font-weight:600;color:#1C0F07;letter-spacing:-0.2px">9:41</span>
    <span style="font-size:12px;color:#1C0F07;opacity:0.7">●●● WiFi ▪▪</span>
  </div>
  <div id="root" style="width:100%;height:100%;position:relative;"></div>
</div>

<script type="text/babel">
const { useState, useEffect } = React;

const NAV = [
  { id:'home',    label:'Home',    d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10' },
  { id:'gear',    label:'My Gear', d:'M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z' },
  { id:'beans',   label:'Beans',   d:'M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z' },
  { id:'profile', label:'Profile', d:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2 M12 11a4 4 0 100-8 4 4 0 000 8z' },
];

const BottomNav = ({ active }) => (
  <nav className="bottom-nav">
    {NAV.map(it => (
      <button key={it.id} className="nav-item">
        <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
          stroke={active===it.id ? '#1C0F07' : '#C4A882'}
          strokeWidth={active===it.id ? 2.5 : 2} strokeLinecap="round" strokeLinejoin="round">
          <path d={it.d}/>
        </svg>
        <span className="nav-label" style={{ color: active===it.id ? '#1C0F07' : '#C4A882' }}>{it.label}</span>
      </button>
    ))}
  </nav>
);

// Inline expand/collapse section
const ProfileSection = ({ title, previewContent, children, defaultOpen = false }) => {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ margin:'0 20px 12px', background:'#FAF3E8', borderRadius:20, padding:'18px 20px', boxShadow:'0 2px 8px rgba(28,15,7,0.07)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: open ? 18 : 0 }}>
        <div>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'#8C5340', marginBottom: open ? 0 : 5 }}>{title}</p>
          {!open && previewContent}
        </div>
        <button onClick={() => setOpen(o => !o)} style={{
          height:30, padding:'0 14px', borderRadius:9999,
          background: open ? 'transparent' : '#F0E4CC',
          border: open ? '1.5px solid #E8D8B8' : 'none',
          cursor:'pointer', fontSize:12, fontWeight:600,
          color: open ? '#8C5340' : '#1C0F07',
          fontFamily:'DM Sans,sans-serif', flexShrink:0
        }}>
          {open ? 'Cancel' : title === 'Password' ? 'Change' : 'Edit'}
        </button>
      </div>
      {open && children}
    </div>
  );
};

const App = () => {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('mrbean_user')) || { firstName:'Ada', lastName:'Lovelace', email:'ada@example.com' }; }
    catch { return { firstName:'Ada', lastName:'Lovelace', email:'ada@example.com' }; }
  });
  const [toast, setToast] = useState(null);
  const [loggedOut, setLoggedOut] = useState(false);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  // Name form
  const [nameForm, setNameForm] = useState({ firstName: user.firstName, lastName: user.lastName });
  const [nameKey, setNameKey] = useState(0); // force re-mount section on save to close it
  const saveName = () => {
    if (!nameForm.firstName.trim()) return;
    const u = { ...user, ...nameForm };
    setUser(u); localStorage.setItem('mrbean_user', JSON.stringify(u));
    setNameKey(k => k+1);
    showToast('Name updated ✓');
  };

  // Password form
  const [pwKey, setPwKey] = useState(0);
  const [pwForm, setPwForm] = useState({ current:'', next:'', confirm:'' });
  const [pwError, setPwError] = useState(null);
  const savePw = () => {
    setPwError(null);
    if (pwForm.next.length < 8) { setPwError('New password must be at least 8 characters.'); return; }
    if (pwForm.next !== pwForm.confirm) { setPwError("Passwords don't match."); return; }
    setPwKey(k => k+1);
    setPwForm({ current:'', next:'', confirm:'' });
    showToast('Password updated ✓');
  };

  const initials = `${user.firstName?.[0]||''}${user.lastName?.[0]||''}`.toUpperCase();

  if (loggedOut) return (
    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32, textAlign:'center' }}>
      <div style={{ fontSize:44, marginBottom:18 }}>👋</div>
      <h2 className="display" style={{ fontSize:26, fontWeight:700, color:'#1C0F07', marginBottom:10 }}>See you next time.</h2>
      <p style={{ fontSize:14, color:'#8C5340' }}>Your gear and shots are waiting.</p>
      <button className="btn-primary" style={{ marginTop:28 }} onClick={() => setLoggedOut(false)}>Sign back in</button>
    </div>
  );

  return (
    <div style={{ width:'100%', height:'100%', position:'relative' }}>
      <div className="main-scroll">
        {/* Header */}
        <div style={{ padding:'12px 24px 24px' }}>
          <h1 className="display" style={{ fontSize:34, fontWeight:900, color:'#1C0F07', letterSpacing:'-0.7px' }}>Profile</h1>
        </div>

        {/* Avatar */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', paddingBottom:28 }}>
          <div style={{ width:72, height:72, borderRadius:36, background:'#1C0F07', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:14, boxShadow:'0 4px 16px rgba(28,15,7,0.2)' }}>
            <span style={{ fontSize:26, fontWeight:700, color:'#FDF8F2', fontFamily:'DM Sans,sans-serif' }}>{initials}</span>
          </div>
          <p style={{ fontSize:18, fontWeight:600, color:'#1C0F07' }}>{user.firstName} {user.lastName}</p>
          <p style={{ fontSize:13, color:'#8C5340', marginTop:4 }}>{user.email}</p>
        </div>

        {/* Edit name */}
        <ProfileSection
          key={`name-${nameKey}`}
          title="Name"
          previewContent={<p style={{ fontSize:15, fontWeight:600, color:'#1C0F07' }}>{user.firstName} {user.lastName}</p>}
        >
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <div>
                <label className="field-label">First name</label>
                <input className="input" value={nameForm.firstName} onChange={e => setNameForm(f => ({...f, firstName: e.target.value}))} autoFocus/>
              </div>
              <div>
                <label className="field-label">Last name</label>
                <input className="input" value={nameForm.lastName} onChange={e => setNameForm(f => ({...f, lastName: e.target.value}))}/>
              </div>
            </div>
            <button className="btn-primary" onClick={saveName} disabled={!nameForm.firstName.trim()}>Save name</button>
          </div>
        </ProfileSection>

        {/* Change password */}
        <ProfileSection
          key={`pw-${pwKey}`}
          title="Password"
          previewContent={<p style={{ fontSize:15, fontWeight:600, color:'#1C0F07', letterSpacing:2 }}>••••••••</p>}
        >
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div>
              <label className="field-label">Current password</label>
              <input className="input" type="password" placeholder="Your current password" value={pwForm.current} onChange={e => { setPwError(null); setPwForm(f => ({...f, current: e.target.value})); }} autoFocus/>
            </div>
            <div>
              <label className="field-label">New password</label>
              <input className="input" type="password" placeholder="Min. 8 characters" value={pwForm.next} onChange={e => { setPwError(null); setPwForm(f => ({...f, next: e.target.value})); }}/>
            </div>
            <div>
              <label className="field-label">Confirm new password</label>
              <input className="input" type="password" placeholder="Same again" value={pwForm.confirm} onChange={e => { setPwError(null); setPwForm(f => ({...f, confirm: e.target.value})); }}/>
            </div>
            {pwError && (
              <div style={{ background:'#FDECEA', border:'1px solid #f5c6c2', borderRadius:12, padding:'10px 14px' }}>
                <p style={{ fontSize:13, color:'#C0392B', fontWeight:500 }}>{pwError}</p>
              </div>
            )}
            <button className="btn-primary" onClick={savePw} disabled={!pwForm.current || !pwForm.next || !pwForm.confirm}>Update password</button>
          </div>
        </ProfileSection>

        {/* Log out */}
        <div style={{ padding:'8px 20px 32px' }}>
          <button onClick={() => { localStorage.removeItem('mrbean_user'); setLoggedOut(true); }} style={{ width:'100%', height:50, borderRadius:32, border:'1.5px solid #FDECEA', background:'#FDECEA', color:'#C0392B', fontFamily:'DM Sans,sans-serif', fontSize:15, fontWeight:600, cursor:'pointer', transition:'background 150ms' }}
            onMouseEnter={e => e.currentTarget.style.background='#f5c6c2'}
            onMouseLeave={e => e.currentTarget.style.background='#FDECEA'}>
            Log out
          </button>
        </div>
      </div>

      <BottomNav active="profile"/>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "db/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: false
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
